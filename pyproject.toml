[dependency-groups]
test = [
    "matplotlib>=3.8",
    "pytest>=8.0",
    "pyyaml>=6.0",
]
style = [
    "black>=24.0",
    "ruff>=0.5",
]
docs = [
    "sphinx>=7.0",
]
autodiff = [
    "jax[cpu]>=0.4.30",
]
build = [
    "build>=1.2",
    "cibuildwheel>=2.23",
    "cmake>=3.20",
    "includeigen>=0.1",
    "ninja>=1.11",
    "pybind11>=3.0",
    "scikit-build-core>=0.12",
]
dev = [
    { include-group = "test" },
    { include-group = "build" },
    { include-group = "style" },
    { include-group = "docs" },
]

[tool.uv]
package = false
default-groups = ["dev"]

[tool.uv.workspace]
members = [
    "packages/epcsaft",
    "packages/epcsaft-equilibrium",
    "packages/epcsaft-regression",
]

[tool.pytest.ini_options]
pythonpath = [
    "packages/epcsaft/src",
    "packages/epcsaft-equilibrium/src",
    "packages/epcsaft-regression/src",
]
addopts = "-ra -p no:cacheprovider"
markers = [
    "native_contract: fast native metadata/result-contract tests that should not run broad solver route suites",
    "equilibrium_native_transition: equilibrium-extension native tests kept on the provider native bridge until native targets split",
    "native_solver: native solver or route-builder tests that may run Ipopt or expensive route setup",
    "ipopt: tests that require or exercise native Ipopt route behavior",
    "slow: tests that are intentionally excluded from routine focused validation unless explicitly targeted",
]

[tool.black]
line-length = 120
target-version = ["py39"]
extend-exclude = '''
(
  ^/build/
  | ^/dist/
  | ^/docs/_build/
  | ^/docs/papers/
  | /out/
  | /results/runs/
  | /figures/.*/output/runs/
)
'''

[tool.ruff]
line-length = 120
target-version = "py39"
extend-exclude = [
    "build",
    "dist",
    "docs/_build",
    "docs/papers",
    "**/out",
    "**/results/runs",
    "**/figures/**/output/runs",
]

[tool.ruff.lint]
select = ["E9", "F63", "F7", "F82", "I", "B", "UP", "NPY", "RUF"]
ignore = ["E402", "E501"]
