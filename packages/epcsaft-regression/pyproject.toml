[build-system]
requires = [
    "scikit-build-core>=0.12",
    "pybind11>=3.0",
    "numpy>=2.0",
    "includeigen>=0.1",
]
build-backend = "epcsaft_regression_build_backend"
backend-path = ["build_backend"]

[project]
name = "epcsaft-regression"
version = "0.1.0"
description = "Ceres-backed regression extension package for ePC-SAFT."
readme = "README.md"
requires-python = ">=3.9"
license = "GPL-3.0-only"
dependencies = [
    "epcsaft==0.2.*",
    "numpy>=2.0",
]

[tool.uv.sources]
epcsaft = { workspace = true }

[tool.epcsaft.extension]
publish = false
monorepo_transition_only = false
package_local_native_build = true
requires_provider_native_sdk = "provider_native_sdk_v1"
native_module = "epcsaft_regression._native_core"
build_option = "EPCSAFT_BUILD_REGRESSION_NATIVE_MODULE=ON"

[tool.scikit-build]
minimum-version = "0.12"
build-dir = "../../build/{wheel_tag}/epcsaft-regression"
wheel.packages = ["src/epcsaft_regression"]
cmake.source-dir = "."
cmake.version = ">=3.20"
ninja.version = ">=1.11"

[tool.scikit-build.sdist]
include = [
    "CMakeLists.txt",
    "README.md",
    "LICENSE",
    "pyproject.toml",
    "build_backend/*.py",
    "src/epcsaft_regression/**/*.py",
    "src/epcsaft_regression/**/*.pyi",
    "src/epcsaft_regression/native/**/*.cpp",
    "src/epcsaft_regression/native/**/*.h",
]
exclude = [
    "src/epcsaft_regression/*.so",
]
