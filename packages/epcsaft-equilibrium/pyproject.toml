[build-system]
requires = ["uv_build>=0.11.16,<0.12"]
build-backend = "uv_build"

[project]
name = "epcsaft-equilibrium"
version = "0.1.0"
description = "Ipopt-backed equilibrium extension package for ePC-SAFT."
requires-python = ">=3.9"
license = "GPL-3.0-only"
dependencies = [
    "epcsaft==0.2.*",
    "numpy>=2.0",
]

[tool.uv.sources]
epcsaft = { workspace = true }

[tool.epcsaft.extension]
publish = false
monorepo_transition_only = true
requires_provider_native_sdk = "provider_native_sdk_v1"
native_module = "epcsaft_equilibrium._native_core"
build_option = "EPCSAFT_BUILD_EQUILIBRIUM_NATIVE_MODULE=ON"
