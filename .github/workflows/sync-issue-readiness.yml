name: sync issue readiness

on:
  issues:
    types: [closed]
  workflow_dispatch:
    inputs:
      issue:
        description: "Resolved issue number to inspect"
        required: false
        type: string
      apply:
        description: "Apply label and mirror changes"
        required: true
        default: false
        type: boolean
  schedule:
    - cron: "17 10 * * *"

permissions:
  contents: write
  issues: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.issue.number || github.run_id }}
  cancel-in-progress: false

jobs:
  sync-readiness:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Install Python
        run: uv python install 3.13

      - name: Install project dependencies
        run: uv sync --no-install-workspace

      - name: Build synchronizer arguments
        id: args
        shell: bash
        env:
          ISSUE_INPUT: ${{ inputs.issue }}
        run: |
          set -euo pipefail
          args=(--repo "${{ github.repository }}")
          if [[ "${{ github.event_name }}" == "schedule" ]]; then
            args+=(--reconcile)
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            if [[ -n "$ISSUE_INPUT" ]]; then
              if [[ ! "$ISSUE_INPUT" =~ ^[0-9]+$ ]]; then
                echo "issue input must contain digits only" >&2
                exit 2
              fi
              args+=(--issue "$ISSUE_INPUT")
            else
              args+=(--reconcile)
            fi
          else
            args+=(--event-path "${{ github.event_path }}" --event-name "${{ github.event_name }}")
          fi
          printf -v script_args '%q ' "${args[@]}"
          printf 'script_args=%s\n' "$script_args" >> "$GITHUB_OUTPUT"

      - name: Dry-run readiness sync
        env:
          GH_TOKEN: ${{ github.token }}
        run: uv run --no-sync python scripts/dev/update_issue_dependency_readiness.py ${{ steps.args.outputs.script_args }} --dry-run --json

      - name: Apply readiness sync
        if: github.event_name != 'workflow_dispatch' || inputs.apply
        env:
          GH_TOKEN: ${{ github.token }}
        run: uv run --no-sync python scripts/dev/update_issue_dependency_readiness.py ${{ steps.args.outputs.script_args }} --apply --json

      - name: Validate docs after mirror changes
        if: github.event_name != 'workflow_dispatch' || inputs.apply
        run: uv run --no-sync python scripts/dev/validate_project.py docs

      - name: Commit mirror changes
        if: github.event_name != 'workflow_dispatch' || inputs.apply
        shell: bash
        run: |
          set -euo pipefail
          git add docs/superpowers docs/agents
          if git diff --cached --quiet -- docs/superpowers docs/agents; then
            echo "No mirror changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Sync issue readiness mirrors"
          git pull --rebase origin main
          git push origin HEAD:main
