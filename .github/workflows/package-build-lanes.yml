name: package-build-lanes

on:
  workflow_dispatch:
    inputs:
      run_ipopt_lanes:
        description: "Run Ipopt-dependent equilibrium and installed-provider extension lanes"
        required: false
        default: false
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  provider-package:
    name: provider package build
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Install Python
        run: uv python install 3.13

      - name: Build provider package artifacts
        run: uv run python scripts/dev/build_dist.py --parallel 1

      - name: Check provider release install
        run: uv run python scripts/dev/check_release_installs.py --dist-dir dist --combination provider

      - name: Upload provider dist
        uses: actions/upload-artifact@v7.0.1
        with:
          name: provider-dist
          path: dist/epcsaft-*

  regression-package:
    name: regression package build
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Install Python
        run: uv python install 3.13

      - name: Build provider package artifacts
        run: uv run python scripts/dev/build_dist.py --parallel 1

      - name: Build reusable Ceres package
        run: uv run python scripts/dev/build_system_ceres.py --parallel 2

      - name: Build regression package artifacts from monorepo provider SDK
        run: uv run python scripts/dev/build_extension_dists.py --mode monorepo --package epcsaft-regression --parallel 1

      - name: Check regression release install
        run: uv run python scripts/dev/check_release_installs.py --dist-dir dist --combination regression

  equilibrium-package:
    name: equilibrium package build
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_ipopt_lanes }}
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Install Python
        run: uv python install 3.13

      - name: Install Ipopt SDK
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends coinor-libipopt-dev
          test -f /usr/include/coin/IpIpoptApplication.hpp
          [[ -f /usr/lib/libipopt.so || -f /usr/lib/x86_64-linux-gnu/libipopt.so ]]

      - name: Build provider package artifacts
        run: uv run python scripts/dev/build_dist.py --parallel 1

      - name: Build equilibrium package artifacts from monorepo provider SDK
        run: uv run python scripts/dev/build_extension_dists.py --mode monorepo --package epcsaft-equilibrium --parallel 1 --ipopt-root /usr

      - name: Check equilibrium release install
        run: uv run python scripts/dev/check_release_installs.py --dist-dir dist --combination equilibrium

  installed-provider-extensions:
    name: installed-provider extension builds
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_ipopt_lanes }}
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Install Python
        run: uv python install 3.13

      - name: Install Ipopt SDK
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends coinor-libipopt-dev
          test -f /usr/include/coin/IpIpoptApplication.hpp
          [[ -f /usr/lib/libipopt.so || -f /usr/lib/x86_64-linux-gnu/libipopt.so ]]

      - name: Build provider package artifacts
        run: uv run python scripts/dev/build_dist.py --parallel 1

      - name: Build reusable Ceres package
        run: uv run python scripts/dev/build_system_ceres.py --parallel 2

      - name: Build extension artifacts from installed provider SDK
        run: uv run python scripts/dev/build_extension_dists.py --mode installed-provider --parallel 1 --ipopt-root /usr

      - name: Check combined release install
        run: uv run python scripts/dev/check_release_installs.py --dist-dir dist --combination all
