name: publish-to-pypi

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to resolve to one commit, such as v0.2.0"
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ inputs.tag }}
  cancel-in-progress: false

jobs:
  pypi-preflight:
    name: PyPI trusted publisher preflight
    runs-on: ubuntu-latest
    outputs:
      release_commit: ${{ steps.resolve-release.outputs.release_commit }}
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Resolve release tag
        id: resolve-release
        shell: bash
        env:
          RELEASE_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          if [[ ! "$RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "release tag must use the exact vMAJOR.MINOR.PATCH form" >&2
            exit 1
          fi
          git show-ref --verify --quiet "refs/tags/${RELEASE_TAG}"
          release_commit="$(git rev-list -n 1 "refs/tags/${RELEASE_TAG}")"
          test -n "$release_commit"
          printf 'release_commit=%s\n' "$release_commit" >> "$GITHUB_OUTPUT"
          git checkout --detach "$release_commit"

      - name: Check PyPI project and release version
        shell: bash
        env:
          RELEASE_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          import json
          import os
          import sys
          import tomllib
          import urllib.error
          import urllib.request

          project = "epcsaft"
          repository = os.environ.get("GITHUB_REPOSITORY", "ePC-SAFT/ePC-SAFT")
          version = tomllib.loads(Path("packages/epcsaft/pyproject.toml").read_text(encoding="utf-8"))["project"]["version"]
          release_tag = os.environ["RELEASE_TAG"]
          if release_tag != f"v{version}":
              raise SystemExit(f"release tag {release_tag!r} does not match provider package version {version!r}")
          url = f"https://pypi.org/pypi/{project}/json"
          try:
              with urllib.request.urlopen(url, timeout=30) as response:
                  payload = json.loads(response.read().decode("utf-8"))
          except urllib.error.HTTPError as exc:
              if exc.code == 404:
                  summary = Path(os.environ["GITHUB_STEP_SUMMARY"])
                  summary.write_text(
                      "## PyPI first-publish preflight\n\n"
                      "PyPI does not have a published `epcsaft` project yet. "
                      "This is valid only when PyPI has a matching pending publisher "
                      f"for `{repository}`, workflow `publish-pypi.yml`, "
                      "environment `pypi`.\n",
                      encoding="utf-8",
                  )
                  print("PyPI project does not exist yet; continuing for trusted-publisher first publish.")
                  sys.exit(0)
              raise
          releases = payload.get("releases", {})
          if version in releases:
              raise SystemExit(f"PyPI already has {project} {version}; bump the version before publishing.")
          print(f"PyPI project exists and {project} {version} is not published yet.")
          PY

  build-sdist:
    name: build sdist
    runs-on: ubuntu-24.04
    needs: [pypi-preflight]

    steps:
      - uses: actions/checkout@v6.0.2
        with:
          ref: ${{ needs.pypi-preflight.outputs.release_commit }}

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Install Python
        run: uv python install 3.13

      - name: Build sdist
        run: uv build packages/epcsaft --sdist

      - name: Upload sdist
        uses: actions/upload-artifact@v7.0.1
        with:
          name: pypi-sdist
          path: dist/*.tar.gz

  build-wheels:
    name: build Linux wheel
    runs-on: ${{ matrix.os }}
    needs: [pypi-preflight]
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04]

    steps:
      - uses: actions/checkout@v6.0.2
        with:
          ref: ${{ needs.pypi-preflight.outputs.release_commit }}

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Install Python
        run: uv python install 3.13

      - name: Sync dependencies
        run: uv sync --locked --no-install-project

      - name: Build wheels
        run: uv run --locked cibuildwheel packages/epcsaft --output-dir wheelhouse
        env:
          CIBW_BUILD: "cp313-*"
          CIBW_ARCHS_LINUX: "x86_64"
          CIBW_SKIP: "*-musllinux*"
          CIBW_TEST_REQUIRES: "numpy"
          CIBW_TEST_COMMAND: "python -c \"import numpy as np; from epcsaft import Mixture, ParameterSet, State; p=ParameterSet.from_dict({'MW': np.asarray([16.043e-3]), 'm': np.asarray([1.0]), 's': np.asarray([3.7039]), 'e': np.asarray([150.03])}, species=['Methane']); s=State(Mixture(p), T=300.0, x=np.asarray([1.0]), rho=100.0); print(s.z())\""

      - name: Upload wheels
        uses: actions/upload-artifact@v7.0.1
        with:
          name: pypi-wheels-${{ matrix.os }}
          path: wheelhouse/*.whl

  publish:
    name: publish to PyPI
    runs-on: ubuntu-latest
    needs: [build-sdist, build-wheels]
    environment:
      name: pypi
      url: https://pypi.org/project/epcsaft/
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Download distributions
        uses: actions/download-artifact@v8.0.1
        with:
          pattern: pypi-*
          path: dist
          merge-multiple: true

      - name: Show distributions
        run: ls -lh dist

      - name: Publish distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
