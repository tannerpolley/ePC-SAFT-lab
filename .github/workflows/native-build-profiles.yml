name: native-build-profiles

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: "23 9 * * 2"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  default-build:
    name: native default build
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Install Python
        run: uv python install 3.13

      - name: Build default native profile
        run: uv run python scripts/dev/build_epcsaft.py --clean --disable-ipopt

      - name: Validate Windows native contracts
        run: uv run python run_pytest.py tests/api/package/test_root_exports.py tests/native/state/test_derivative_runtime_contract.py tests/native/contracts/test_ceres_cppad_build_contract.py tests/native/contracts/test_equilibrium_activation_capabilities.py -q

  cppad-build:
    name: native CppAD build
    if: ${{ github.event_name == 'workflow_dispatch' || github.event_name == 'schedule' }}
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Install Python
        run: uv python install 3.13

      - name: Build CppAD native profile
        run: uv run python scripts/dev/build_epcsaft.py --clean --enable-cppad --disable-ipopt

      - name: Validate CppAD runtime contract
        run: uv run python run_pytest.py tests/native/state/test_cppad_scalar_smoke.py tests/native/state/test_derivative_runtime_contract.py -q

