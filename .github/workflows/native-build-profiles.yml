name: native-build-profiles

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  default-build:
    name: native no-Ipopt smoke
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Install Python
        run: uv python install 3.13

      - name: Build no-Ipopt native smoke profile
        run: uv run python scripts/dev/build_epcsaft.py --clean --disable-ipopt

      - name: Validate no-Ipopt native smoke contracts
        run: uv run python run_pytest.py packages/epcsaft/tests/api/package/test_root_exports.py packages/epcsaft/tests/native/state/test_derivative_runtime_contract.py packages/epcsaft-regression/tests/contracts/test_ceres_cppad_build_contract.py packages/epcsaft-equilibrium/tests/contracts/test_activation_capabilities.py -q

  cppad-build:
    name: native CppAD derivative contract
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Install Python
        run: uv python install 3.13

      - name: Build CppAD native profile
        run: uv run python scripts/dev/build_epcsaft.py --clean --profile full --disable-ipopt

      - name: Validate CppAD runtime contract
        run: uv run python run_pytest.py packages/epcsaft/tests/native/state/test_cppad_scalar_smoke.py packages/epcsaft/tests/native/state/test_derivative_runtime_contract.py packages/epcsaft/tests/native/contracts/test_association_implicit_derivative_contract.py packages/epcsaft/tests/native/state/test_association_parameter_derivative_validation.py -q

