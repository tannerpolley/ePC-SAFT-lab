name: local-development-smoke

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
    inputs:
      full_wheel_matrix:
        description: "Run the Windows wheel and sdist packaging checks"
        required: false
        default: false
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  fast-pr-smoke:
    name: fast workflow smoke
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Install Python
        run: uv python install 3.13

      - name: Check lightweight package and workflow contracts
        shell: pwsh
        run: |
          @'
          from pathlib import Path
          import ast
          import re
          import tomllib

          workflow = Path(".github/workflows/wheels.yml").read_text(encoding="utf-8")
          stale = [
              "actions/checkout@" + "v4",
              "astral-sh/setup-uv@" + "v6",
              "actions/upload-artifact@" + "v4",
              "Node.js " + "20",
              "node" + "20",
          ]
          found = [token for token in stale if token in workflow]
          if found:
              raise SystemExit(f"stale workflow action/runtime token(s): {found}")
          for token in (
              "actions/checkout@v6.0.2",
              "astral-sh/setup-uv@v8.1.0",
              "actions/upload-artifact@v7.0.1",
              "branches: [main]",
              "fast workflow smoke",
              "windows install smoke",
              "uv python install 3.13",
              '$repoUrl = "file:///"',
              "epcsaft @ $repoUrl",
              "UV_CACHE_DIR",
              "EPCSAFT_PEP517_BUILD_DIR",
              "uv sync",
              "uv run --no-sync",
              'CIBW_BUILD: "cp313-*"',
          ):
              if token not in workflow:
                  raise SystemExit(f"missing workflow contract token: {token}")
          windows_smoke = re.search(
              r"windows-install-smoke:\n(?P<body>.*?)(?:\n  build:|\Z)",
              workflow,
              re.S,
          ).group("body")
          if "    if:" in windows_smoke:
              raise SystemExit("windows install smoke must run on pull_request and push events")
          old_wheel_command = "uv build --" + "wheel"
          old_wheel_step = "Build Windows " + "wheel"
          if old_wheel_command in windows_smoke:
              raise SystemExit("default windows install smoke must not build wheel artifacts")
          if old_wheel_step in windows_smoke:
              raise SystemExit("default windows install smoke must not use the old wheel-build step")
          old_python = "uv python install " + "3." + "12"
          old_cibw = 'CIBW_BUILD: "cp' + '312-*"'
          if old_python in workflow or old_cibw in workflow:
              raise SystemExit("workflow must use the Python 3.13 smoke baseline")

          pyproject = tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))
          project = pyproject["project"]
          if project["name"] != "epcsaft":
              raise SystemExit("unexpected project name")
          deps = "\n".join(str(item).lower() for item in project.get("dependencies", ()))
          if "numpy" not in deps or "pandas" not in deps:
              raise SystemExit("runtime dependencies must include numpy and pandas")
          blocked = "sci" + "py"
          if blocked in deps:
              raise SystemExit("runtime dependencies must not include the external optimizer stack")

          init_tree = ast.parse(Path("src/epcsaft/__init__.py").read_text(encoding="utf-8"))
          exported = {
              alias.name
              for node in init_tree.body
              if isinstance(node, ast.ImportFrom)
              for alias in node.names
          }
          required_exports = {
              "Mixture",
              "State",
              "ParameterSet",
              "ModelOptions",
              "InputError",
              "SolutionError",
              "create_input_template",
              "capabilities",
          }
          missing_exports = sorted(required_exports - exported)
          if missing_exports:
              raise SystemExit(f"missing public exports: {missing_exports}")
          equilibrium_tree = ast.parse(
              Path("packages/epcsaft-equilibrium/src/epcsaft_equilibrium/__init__.py").read_text(encoding="utf-8")
          )
          equilibrium_exports = {
              alias.name
              for node in equilibrium_tree.body
              if isinstance(node, ast.ImportFrom)
              for alias in node.names
          }
          if "Equilibrium" not in equilibrium_exports:
              raise SystemExit("missing equilibrium extension export: Equilibrium")
          regression_tree = ast.parse(
              Path("packages/epcsaft-regression/src/epcsaft_regression/__init__.py").read_text(encoding="utf-8")
          )
          regression_exports = {
              alias.name
              for node in regression_tree.body
              if isinstance(node, ast.ImportFrom)
              for alias in node.names
          }
          if "Regression" not in regression_exports:
              raise SystemExit("missing regression extension export: Regression")
          legacy_exports = {
              "ePC" + "SAFTMixture",
              "ePC" + "SAFTState",
              "fit_pure_" + "neutral",
              "Equilibrium",
              "Regression",
              "bubble_p",
              "dew_p",
          }
          stale_exports = sorted(legacy_exports & exported)
          if stale_exports:
              raise SystemExit(f"stale legacy root exports: {stale_exports}")
          print("fast workflow/package contract smoke passed")
          '@ | uv run --no-project --python 3.13 python -

  windows-install-smoke:
    name: windows install smoke
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Install Python
        run: uv python install 3.13

      - name: Install as downstream path dependency
        shell: pwsh
        run: |
          $downstream = Join-Path $env:RUNNER_TEMP "epcsaft-downstream-smoke"
          New-Item -ItemType Directory -Force -Path $downstream | Out-Null
          $repoUrl = "file:///" + ($env:GITHUB_WORKSPACE -replace "\\", "/")
          @"
          [project]
          name = "epcsaft-downstream-smoke"
          version = "0.0.0"
          requires-python = ">=3.13"
          dependencies = [
              "epcsaft @ $repoUrl",
          ]
          "@ | Set-Content -LiteralPath (Join-Path $downstream "pyproject.toml") -Encoding UTF8
          $env:UV_CACHE_DIR = Join-Path $env:RUNNER_TEMP "uv-cache"
          $env:EPCSAFT_PEP517_BUILD_DIR = Join-Path $env:RUNNER_TEMP "epcsaft-pep517-build"
          Set-Location $downstream
          uv sync --python 3.13

      - name: Smoke installed package
        shell: pwsh
        run: |
          $downstream = Join-Path $env:RUNNER_TEMP "epcsaft-downstream-smoke"
          Set-Location $downstream
          $env:UV_CACHE_DIR = Join-Path $env:RUNNER_TEMP "uv-cache"
          $env:EPCSAFT_PEP517_BUILD_DIR = Join-Path $env:RUNNER_TEMP "epcsaft-pep517-build"
          uv run --no-sync python -c "import numpy as np; from epcsaft import Mixture, ParameterSet, State; p = ParameterSet.from_dict({'MW': np.asarray([16.043e-3]), 'm': np.asarray([1.0]), 's': np.asarray([3.7039]), 'e': np.asarray([150.03])}, species=['Methane']); s = State(Mixture(p), T=300.0, x=np.asarray([1.0]), rho=100.0); print(s.z())"

  build:
    name: build Windows wheel
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.full_wheel_matrix }}
    runs-on: ${{ matrix.os }}
    needs: windows-install-smoke
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest]

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Install Python
        run: uv python install 3.13

      - name: Sync dependencies
        run: uv sync --locked --no-install-project

      - name: Build wheels
        run: uv run --locked cibuildwheel --output-dir wheelhouse
        env:
          CIBW_BUILD: "cp313-*"
          CIBW_ARCHS_WINDOWS: "AMD64"
          CIBW_SKIP: "*-win32 *-musllinux*"
          CIBW_TEST_REQUIRES: "numpy"
          CIBW_TEST_COMMAND: "python -c \"import numpy as np; from epcsaft import Mixture, ParameterSet, State; p=ParameterSet.from_dict({'MW': np.asarray([16.043e-3]), 'm': np.asarray([1.0]), 's': np.asarray([3.7039]), 'e': np.asarray([150.03])}, species=['Methane']); s=State(Mixture(p), T=300.0, x=np.asarray([1.0]), rho=100.0); print(s.z())\""

      - name: Upload wheels
        uses: actions/upload-artifact@v7.0.1
        with:
          name: wheels-${{ matrix.os }}
          path: wheelhouse/*.whl

  sdist:
    name: build sdist
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.full_wheel_matrix }}
    runs-on: windows-latest
    needs: windows-install-smoke

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Install Python
        run: uv python install 3.13

      - name: Build sdist
        run: uv build --sdist

      - name: Upload sdist
        uses: actions/upload-artifact@v7.0.1
        with:
          name: sdist
          path: dist/*.tar.gz
