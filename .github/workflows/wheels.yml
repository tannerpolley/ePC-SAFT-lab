name: local-development-smoke

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
    inputs:
      full_wheel_matrix:
        description: "Run the Linux wheel and sdist packaging checks"
        required: false
        default: false
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  PROVIDER_SMOKE_PYTHON: >-
    import math; import epcsaft as e; import numpy as np;
    source=e.ScientificSource(kind="literature", locator="Gross and Sadowski 2001 Table 2");
    domain=e.TemperatureDomain(minimum_K=100.0, maximum_K=400.0,
    evidence=e.DomainEvidence(kind="source_validity", source="CI methane smoke interval"));
    dependency=e.DependencySignature(variables=());
    values={"molar_mass_kg_per_mol": (0.016043, "kg/mol"),
    "segment_count": (1.0, "dimensionless"), "sigma_angstrom": (3.7039, "angstrom"),
    "epsilon_k_K": (150.03, "K"), "charge_number": (0.0, "dimensionless"),
    "association_energy_K": (0.0, "K"), "association_volume": (0.0, "dimensionless")};
    records=tuple(e.ScientificRecord(record_id=f"methane-{field}", component="Methane",
    field=field, units=units, source=source, dependency_signature=dependency,
    temperature_domain=domain, definition=e.ConstantCorrelation(value=value))
    for field, (value, units) in values.items());
    parameters=e.ParameterSet.from_schema3_records(components=("Methane",), pure_records=records);
    options=e.ModelOptions.from_user_options({"schema": "epcsaft.model-configuration",
    "schema_version": 1, "selection_origin": "explicit_configuration",
    "formulation": {name: {"enabled": False} for name in ("electrostatics",
    "relative_permittivity", "debye_huckel", "born", "solvated_ion_diameter",
    "ion_dispersion")}});
    state=e.State(e.Mixture(parameters, model_options=options), T=300.0,
    x=np.asarray([1.0]), rho=100.0); z=state.z(); assert math.isfinite(z); print(z)

jobs:
  fast-pr-smoke:
    name: fast workflow smoke
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Install Python
        run: uv python install 3.13

      - name: Check lightweight package and workflow contracts
        shell: bash
        run: |
          set -euo pipefail
          uv run --no-project --python 3.13 python - <<'PY'
          from pathlib import Path
          import ast
          import re
          import tomllib

          workflow = Path(".github/workflows/wheels.yml").read_text(encoding="utf-8")
          stale = [
              "actions/checkout@" + "v4",
              "astral-sh/setup-uv@" + "v6",
              "actions/upload-artifact@" + "v4",
              "Node.js " + "20",
              "node" + "20",
          ]
          found = [token for token in stale if token in workflow]
          if found:
              raise SystemExit(f"stale workflow action/runtime token(s): {found}")
          for token in (
              "actions/checkout@v6.0.2",
              "astral-sh/setup-uv@v8.1.0",
              "actions/upload-artifact@v7.0.1",
              "branches: [main]",
              "fast workflow smoke",
              "linux install smoke",
              "uv python install 3.13",
              'repo_url="file://${GITHUB_WORKSPACE}"',
              "epcsaft @ ${repo_url}/packages/epcsaft",
              "UV_CACHE_DIR",
              "EPCSAFT_PEP517_BUILD_DIR",
              "uv sync",
              "uv run --no-sync",
              'CIBW_BUILD: "cp313-*"',
          ):
              if token not in workflow:
                  raise SystemExit(f"missing workflow contract token: {token}")
          linux_smoke = re.search(
              r"linux-install-smoke:\n(?P<body>.*?)(?:\n  build:|\Z)",
              workflow,
              re.S,
          ).group("body")
          if "    if:" in linux_smoke:
              raise SystemExit("linux install smoke must run on pull_request and push events")
          old_wheel_command = "uv build --" + "wheel"
          old_wheel_step = "Build Linux " + "wheel"
          if old_wheel_command in linux_smoke:
              raise SystemExit("default linux install smoke must not build wheel artifacts")
          if old_wheel_step in linux_smoke:
              raise SystemExit("default linux install smoke must not use the old wheel-build step")
          old_python = "uv python install " + "3." + "12"
          old_cibw = 'CIBW_BUILD: "cp' + '312-*"'
          if old_python in workflow or old_cibw in workflow:
              raise SystemExit("workflow must use the Python 3.13 smoke baseline")

          pyproject = tomllib.loads(Path("packages/epcsaft/pyproject.toml").read_text(encoding="utf-8"))
          project = pyproject["project"]
          if project["name"] != "epcsaft":
              raise SystemExit("unexpected project name")
          deps = "\n".join(str(item).lower() for item in project.get("dependencies", ()))
          if "numpy" not in deps or "pandas" not in deps:
              raise SystemExit("runtime dependencies must include numpy and pandas")
          blocked = "sci" + "py"
          if blocked in deps:
              raise SystemExit("runtime dependencies must not include the external optimizer stack")

          init_tree = ast.parse(Path("packages/epcsaft/src/epcsaft/__init__.py").read_text(encoding="utf-8"))
          exported = {
              alias.name
              for node in init_tree.body
              if isinstance(node, ast.ImportFrom)
              for alias in node.names
          }
          required_exports = {
              "Mixture",
              "State",
              "ParameterSet",
              "ModelOptions",
              "InputError",
              "SolutionError",
              "create_input_template",
              "capabilities",
          }
          missing_exports = sorted(required_exports - exported)
          if missing_exports:
              raise SystemExit(f"missing public exports: {missing_exports}")
          equilibrium_tree = ast.parse(
              Path("packages/epcsaft-equilibrium/src/epcsaft_equilibrium/__init__.py").read_text(encoding="utf-8")
          )
          equilibrium_exports = {
              alias.name
              for node in equilibrium_tree.body
              if isinstance(node, ast.ImportFrom)
              for alias in node.names
          }
          if "Equilibrium" not in equilibrium_exports:
              raise SystemExit("missing equilibrium extension export: Equilibrium")
          regression_tree = ast.parse(
              Path("packages/epcsaft-regression/src/epcsaft_regression/__init__.py").read_text(encoding="utf-8")
          )
          regression_exports = {
              alias.name
              for node in regression_tree.body
              if isinstance(node, ast.ImportFrom)
              for alias in node.names
          }
          if "Regression" not in regression_exports:
              raise SystemExit("missing regression extension export: Regression")
          legacy_exports = {
              "ePC" + "SAFTMixture",
              "ePC" + "SAFTState",
              "fit_pure_" + "neutral",
              "Equilibrium",
              "Regression",
              "bubble_p",
              "dew_p",
          }
          stale_exports = sorted(legacy_exports & exported)
          if stale_exports:
              raise SystemExit(f"stale legacy root exports: {stale_exports}")
          print("fast workflow/package contract smoke passed")
          PY

  linux-install-smoke:
    name: linux install smoke
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Install Python
        run: uv python install 3.13

      - name: Install as downstream path dependency
        shell: bash
        run: |
          set -euo pipefail
          downstream="${RUNNER_TEMP}/epcsaft-downstream-smoke"
          mkdir -p "$downstream"
          repo_url="file://${GITHUB_WORKSPACE}"
          cat > "${downstream}/pyproject.toml" <<EOF
          [project]
          name = "epcsaft-downstream-smoke"
          version = "0.0.0"
          requires-python = ">=3.13"
          dependencies = [
              "epcsaft @ ${repo_url}/packages/epcsaft",
          ]
          EOF
          export UV_CACHE_DIR="${RUNNER_TEMP}/uv-cache"
          export EPCSAFT_PEP517_BUILD_DIR="${RUNNER_TEMP}/epcsaft-pep517-build"
          cd "$downstream"
          uv sync --python 3.13

      - name: Smoke installed package
        shell: bash
        run: |
          set -euo pipefail
          downstream="${RUNNER_TEMP}/epcsaft-downstream-smoke"
          cd "$downstream"
          export UV_CACHE_DIR="${RUNNER_TEMP}/uv-cache"
          export EPCSAFT_PEP517_BUILD_DIR="${RUNNER_TEMP}/epcsaft-pep517-build"
          uv run --no-sync python -c "$PROVIDER_SMOKE_PYTHON"

  build:
    name: build Linux wheel
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.full_wheel_matrix }}
    runs-on: ${{ matrix.os }}
    needs: linux-install-smoke
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04]

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Install Python
        run: uv python install 3.13

      - name: Sync dependencies
        run: uv sync --locked --no-install-project

      - name: Build wheels
        run: uv run --locked cibuildwheel packages/epcsaft --output-dir wheelhouse
        env:
          CIBW_BUILD: "cp313-*"
          CIBW_ARCHS_LINUX: "x86_64"
          CIBW_SKIP: "*-musllinux*"
          CIBW_TEST_REQUIRES: "numpy"
          CIBW_ENVIRONMENT_PASS_LINUX: "PROVIDER_SMOKE_PYTHON"
          CIBW_TEST_COMMAND: 'python -c "$PROVIDER_SMOKE_PYTHON"'

      - name: Upload wheels
        uses: actions/upload-artifact@v7.0.1
        with:
          name: wheels-${{ matrix.os }}
          path: wheelhouse/*.whl

  sdist:
    name: build sdist
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.full_wheel_matrix }}
    runs-on: ubuntu-24.04
    needs: linux-install-smoke

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Install Python
        run: uv python install 3.13

      - name: Build sdist
        run: uv build packages/epcsaft --sdist

      - name: Upload sdist
        uses: actions/upload-artifact@v7.0.1
        with:
          name: sdist
          path: dist/*.tar.gz
