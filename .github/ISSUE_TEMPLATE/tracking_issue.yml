name: Milestone tracking issue
description: Track one milestone plan or major tranche under a single GitHub milestone.
title: "Tracking: <milestone tranche>"
labels: ["needs-triage"]
projects: ["ePC-SAFT/1"]
body:
  - type: markdown
    attributes:
      value: |
        Use this for a milestone plan or major tranche. A tracking issue owns the checklist of micro issues and gates for one GitHub milestone.
        Use `docs/milestones/Mx-name/plans/` for local plan documents when the issue needs more durable context than the issue body.
  - type: dropdown
    id: plan-milestone
    attributes:
      label: GitHub milestone
      description: Assign this same GitHub milestone after filing.
      options:
        - M0 - Governance
        - M1 - Packages
        - M2 - Python API
        - M3 - EOS
        - M4 - Equilibrium
        - M5 - Regression
        - M6 - Validation
        - M7 - Release
    validations:
      required: true
  - type: input
    id: milestone-plan
    attributes:
      label: Milestone plan
      description: Path to the local plan file this tracking issue owns, when a plan file exists.
      placeholder: docs/milestones/Mx-name/plans/<plan>.md
    validations:
      required: true
  - type: dropdown
    id: package
    attributes:
      label: Project package field
      options:
        - core
        - equilibrium
        - regression
        - benchmark
        - downstream
    validations:
      required: true
  - type: textarea
    id: outcome
    attributes:
      label: Outcome
      description: What must be true when this tracking issue closes?
    validations:
      required: true
  - type: textarea
    id: child-issues
    attributes:
      label: Child micro issues and gates
      description: List known micro issues, gate issues, or TODO issue titles. Update with issue numbers after filing.
      placeholder: |
        - [ ] #123 Implement ...
        - [ ] #124 Prove ...
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Tracking acceptance criteria
      description: Gates that prove the whole milestone tranche is complete.
    validations:
      required: true
  - type: textarea
    id: validation
    attributes:
      label: Required validation
      description: Commands, docs checks, CI checks, Project updates, and plan evidence required before closing.
      render: powershell
    validations:
      required: true
