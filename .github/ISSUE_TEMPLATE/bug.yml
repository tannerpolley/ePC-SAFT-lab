name: Bug
description: Report a reproducible defect in current ePC-SAFT behavior.
title: "Bug: <short failure>"
labels: ["bug", "needs-triage", "type:bug"]
projects: ["ePC-SAFT/1"]
type: bug
body:
  - type: markdown
    attributes:
      value: |
        Use this for an unexpected problem in behavior that already exists. Use a feature or task issue for planned capability work.
  - type: dropdown
    id: plan-milestone
    attributes:
      label: GitHub milestone
      description: Select the milestone that owns the failing behavior.
      options:
        - M0 - Governance
        - M1 - Packages
        - M2 - Python API
        - M3 - EOS
        - M4 - Equilibrium
        - M5 - Regression
        - M6 - Validation
        - M7 - Release
    validations:
      required: true
  - type: input
    id: plan-file
    attributes:
      label: Plan file
      description: Local plan path if this bug needs one; write `none` for a small directly actionable bug.
      placeholder: docs/milestones/Mx-name/ideas/<plan>.md
    validations:
      required: true
  - type: textarea
    id: outcome
    attributes:
      label: Outcome
      description: What working behavior must be restored or proven?
    validations:
      required: true
  - type: textarea
    id: current-behavior
    attributes:
      label: Current behavior
      description: Exact observed failure, traceback, bad result, or broken command.
      render: text
    validations:
      required: true
  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected behavior
      description: What should happen instead?
    validations:
      required: true
  - type: textarea
    id: reproducer
    attributes:
      label: Reproducer
      description: Smallest command, test, or Python snippet that reproduces the bug.
      render: powershell
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: Concrete checks that must be true before closing.
    validations:
      required: true
  - type: textarea
    id: non-goals
    attributes:
      label: Non-goals
      description: Work that must not be pulled into the fix.
    validations:
      required: true
  - type: textarea
    id: proof-oracle
    attributes:
      label: Proof oracle
      description: Commands, docs checks, audits, or issue/Project updates required before closing.
      render: powershell
    validations:
      required: true
