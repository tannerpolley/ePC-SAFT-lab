version: 2

goal:
  title: "Architecture Deepening"
  slug: "architecture-deepening"
  kind: existing_plan
  tranche: "continuous execution: complete successive safe verified slices until all six architecture candidates are implemented or explicitly blocked"
  status: complete
  intake:
    original_request: "/goal Implement all of them"
    interpreted_outcome: "Implement the six architecture-deepening candidates identified by the prior improve-codebase-architecture pass."
    input_shape: existing_plan
    audience: "ePC-SAFT package maintainers and downstream package consumers"
    authority: requested
    proof_type: test
    completion_proof: "All six candidates have code/test/doc updates or explicit blocked receipts, focused validation passes for touched boundaries, a final audit maps receipts to the six candidates, cleanup passes, and tracked changes are committed locally."
    likely_misfire: "Only producing planning artifacts, wrappers, or docs while leaving duplicated behavior paths and evidence boundaries unchanged."
    blind_spots_considered:
      - "Native _core rebuild coordination and locked extension risk."
      - "Public API compatibility for downstream consumers."
      - "Capability claims must remain evidence-backed."
      - "Full validation cost can be high; use focused checks first."
      - "Reactive/electrolyte route correctness must not be weakened by generic normalization."
    existing_plan_facts:
      - "Candidate 1: Equilibrium request and result normalization."
      - "Candidate 2: Native route variableization and residual core."
      - "Candidate 3: Ipopt solve metadata and diagnostics."
      - "Candidate 4: Regression evidence and target-family summaries."
      - "Candidate 5: Parameter family payload boundary."
      - "Candidate 6: Capability evidence and validation lane registry."

rules:
  pm_owns_state: true
  one_active_task: true
  max_write_workers: 1
  no_implementation_without_worker_or_pm_task: true
  no_completion_without_judge_or_pm_audit: true
  planning_is_not_completion: true
  queued_required_worker_blocks_completion: true
  continuous_until_full_outcome: true
  missing_input_or_credentials_do_not_stop_goal: true
  preserve_and_validate_existing_plan: true
  intake_misfire_must_be_audited: true
  slice_policy:
    max_consecutive_tiny_tasks: 2
    prefer_vertical_slices: true
    judge_picks_largest_safe_slice: true
    worker_completes_whole_slice: true

agents:
  scout: installed
  worker: installed
  judge: installed

visual_board:
  selected: local
  local:
    status: live
    url: "http://127.0.0.1:41737/architecture-deepening/"
    command: "pwsh -NoProfile -ExecutionPolicy Bypass -File C:\\Users\\Tanner\\Documents\\git\\codex-maintenance\\scripts\\start-goalbuddy-board.ps1 -Goal docs/goals/architecture-deepening"
