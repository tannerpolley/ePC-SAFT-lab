version: 2

goal:
  title: "Native Topology Activation Matrix Completion"
  slug: "native-topology-activation-matrix-completion"
  kind: existing_plan
  tranche: "Complete the selector-core, route-deletion, activation-capability, docs, validation, commit, and push tranche from the approved plan."
  status: done
  intake:
    original_request: "Implement the Native Topology Activation Matrix Completion Plan in full."
    interpreted_outcome: "The production bubble-pressure native path is selector-core and activation-matrix driven, stale non-production route surfaces are removed, capabilities and docs are current, strict gates pass, and branch ipopt is pushed."
    input_shape: existing_plan
    audience: "epcsaft maintainers and downstream package consumers"
    authority: requested
    proof_type: test
    completion_proof: "Updated Gate 10 passes, GoalBuddy checker passes, role-owner review is recorded, local commits exist, ipopt is pushed, and git status is clean."
    likely_misfire: "Completing only mechanical moves or documentation while route internals, capabilities, or public API claims still drift from the activation matrix."
    blind_spots_considered:
      - "Deleted-route blast radius across Python wrappers, bindings, generated docs, and tests."
      - "Python activation mirror drift from the C++ source of truth."
      - "Accidentally preserving hidden route shells or compatibility stubs."
      - "Certification diagnostics existing without hard acceptance gating."
    existing_plan_facts:
      - "Use contract-test-first sequencing for structure, capability mirror, selector certification, and deleted-route absence."
      - "Keep only Equilibrium.bubble_pressure as the public production equilibrium path."
      - "Delete TP flash, LLE, stability, electrolyte, reactive, reactive speciation, and electrolyte/reactive bubble route surfaces."
      - "Production bubble-pressure inputs are neutral, non-reactive, non-electrolyte, non-associating mixtures."
      - "Selector certification is a hard acceptance gate."
      - "Generated Graphify artifacts remain untracked."
      - "Stay on ipopt, commit locally, push branch, and do not open a PR."

rules:
  pm_owns_state: true
  one_active_task: true
  max_write_workers: 1
  no_implementation_without_worker_or_pm_task: true
  no_completion_without_judge_or_pm_audit: true
  planning_is_not_completion: true
  queued_required_worker_blocks_completion: true
  continuous_until_full_outcome: true
  missing_input_or_credentials_do_not_stop_goal: true
  preserve_and_validate_existing_plan: true
  intake_misfire_must_be_audited: true
  slice_policy:
    max_consecutive_tiny_tasks: 2
    prefer_vertical_slices: true
    judge_picks_largest_safe_slice: true
    worker_completes_whole_slice: true

agents:
  scout: installed
  worker: installed
  judge: installed

