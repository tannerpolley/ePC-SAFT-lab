version: 2

goal:
  title: "Constructor-Configured Equilibrium API"
  slug: "equilibrium-setup-workflow"
  kind: existing_plan
  tranche: "Complete the full constructor-configured Equilibrium API reset from the strict handoff."
  status: active
  intake:
    original_request: "Use the equilibrium constructor-configured API handoff to accomplish the full goal with no assumptions."
    interpreted_outcome: "Equilibrium is configured in the constructor, solve() executes the configured problem, result/structure/capability/docs behavior matches the handoff, validation passes, local commits exist, and branch ipopt is pushed."
    input_shape: existing_plan
    audience: "epcsaft maintainers and downstream package consumers"
    authority: requested
    proof_type: test
    completion_proof: "Every handoff gate has a receipt, required tests and confidence validation pass, GoalBuddy checker passes, local commits exist, branch ipopt is pushed, and git status is clean."
    likely_misfire: "Preserving legacy direct-solve compatibility or only reshaping tests/docs while the public API, native selector boundary, capabilities, or active roadmaps still contradict the constructor-configured workflow."
    blind_spots_considered:
      - "Implementation files must not be edited before this board passes the checker."
      - "Owner files must be proven from actual repo files before edits."
      - "All five current VLE route specs need constructor-contract coverage."
      - "Legacy direct-solve kwargs must die without compatibility forwarding."
      - "Result phases must be immutable and keyed by public labels."
      - "Structure metadata must be generally owned or explicitly unavailable."
      - "Initialization must be real native-selector-backed behavior or absent."
      - "Capabilities must advertise public route names only and must not overclaim future route families."
      - "Stale durable docs must be updated, while temporary contradictory receipts may be removed only when clearly temporary."
      - "Owner-agent review, full confidence validation, local commits, push, cleanup, and clean status are completion gates."
    existing_plan_facts:
      - "Handoff: docs/handoffs/equilibrium-constructor-configured-api-handoff.md."
      - "Goal title: Constructor-Configured Equilibrium API."
      - "Goal slug: equilibrium-setup-workflow."
      - "Current branch must be ipopt."
      - "Local live board should be attempted by default."
      - "Required owner files are listed in the handoff and must be inspected before implementation edits."
      - "Solver controls live on solve(solver_options=...), not in the constructor."
      - "solver_options accepts a dict or EquilibriumSolverOptions dataclass."
      - "Normal examples still require only Equilibrium and Mixture imports."
      - "Public phase labels are liquid and vapor."
      - "Production constructor routes are bubble_pressure, bubble_temperature, dew_pressure, dew_temperature, and flash."
      - "Constructor routes map to selector routes and activation keys exactly as in the handoff matrix."
      - "Do not add wrappers, aliases, route-specific public methods, broad public escape hatches, fake initialize(), or Python-owned route shortcuts."
      - "If any action is ambiguous, stop and ask instead of guessing."

rules:
  pm_owns_state: true
  one_active_task: true
  max_write_workers: 1
  no_implementation_without_worker_or_pm_task: true
  no_completion_without_judge_or_pm_audit: true
  planning_is_not_completion: true
  queued_required_worker_blocks_completion: true
  continuous_until_full_outcome: true
  missing_input_or_credentials_do_not_stop_goal: true
  preserve_and_validate_existing_plan: true
  intake_misfire_must_be_audited: true
  slice_policy:
    max_consecutive_tiny_tasks: 2
    prefer_vertical_slices: true
    judge_picks_largest_safe_slice: true
    worker_completes_whole_slice: true

