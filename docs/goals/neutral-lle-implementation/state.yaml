        - "activation_matrix.h has neutral_lle production_exposed=false with the target residual/constraint families already sketched."
        - "activation_plan.cpp, variable_layout.cpp, activated_equilibrium_nlp.cpp, and selector_core.cpp currently admit neutral_tp_flash only."
        - "two_phase_eos_route.cpp already has generic phase-distance machinery suitable for a nonassociating LLE route."
        - "workflows.py exposes bubble/dew/flash routes and VLE-only liquid/vapor result conveniences."
