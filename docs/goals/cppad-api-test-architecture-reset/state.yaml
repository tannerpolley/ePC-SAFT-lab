version: 2

goal:
  title: "CppAD-Only API And Test Architecture Reset"
  slug: "cppad-api-test-architecture-reset"
  kind: existing_plan
  tranche: "continuous execution: close competing boards, prove CppAD-only hydrocarbon engine, reset the public API, then rebuild focused tests around the new frontend"
  status: done
  intake:
    original_request: "PLEASE IMPLEMENT THIS PLAN: CppAD-Only API And Test Reset Goal"
    interpreted_outcome: "The package exposes a clean Mixture/State/Equilibrium/Regression frontend backed by CppAD-only production evaluation and focused hydrocarbon proof tests."
    input_shape: existing_plan
    audience: "ePC-SAFT package maintainers and downstream package users"
    authority: requested
    proof_type: test
    completion_proof: "Focused hydrocarbon State, Regression, and VLE bubble/IPOPT tests pass through the new API; old public exports are gone; test roots are separated by Interface, native Implementation, workflows, and support; quick validation and cleanup pass."
    likely_misfire: "Adding new wrapper names while old public exports, analytic backend choices, or mixed pytest roots remain reachable."
    blind_spots_considered:
      - "CppAD-only evaluation must be proved before the new public API wraps it."
      - "State values such as Z and fugacity-related quantities must not route through old analytic public state methods in the final API."
      - "Regression and equilibrium exact derivatives are blockers, not optional backend choices."
      - "Hydrocarbon proof is the completion line for this goal; electrolyte/reactive validation is intentionally deferred."
      - "Old GoalBuddy boards must not remain active and confuse execution state."
      - "Native _core rebuilds must be coordinated by the main thread."
    existing_plan_facts:
      - "New public names: Mixture, State, Equilibrium, Regression, ParameterSet, ModelOptions."
      - "ParameterSet stores parameters only; ModelOptions belongs to Mixture."
      - "Relative permittivity is a two-layer model: component data in ParameterSet, mixture rule in ModelOptions."
      - "SSM/DS/Born variants are explicit ModelOptions formulation choices with clear missing-parameter errors."
      - "CppAD is required everywhere for public State, Equilibrium, and Regression property/derivative evaluation."
      - "Final state has a hard cutoff and no legacy import layer."

rules:
  pm_owns_state: true
  one_active_task: true
  max_write_workers: 1
  no_implementation_without_worker_or_pm_task: true
  no_completion_without_judge_or_pm_audit: true
  planning_is_not_completion: true
  queued_required_worker_blocks_completion: true
  continuous_until_full_outcome: true
  missing_input_or_credentials_do_not_stop_goal: true
  preserve_and_validate_existing_plan: true
  intake_misfire_must_be_audited: true
  slice_policy:
    max_consecutive_tiny_tasks: 2
    prefer_vertical_slices: true
    judge_picks_largest_safe_slice: true
    worker_completes_whole_slice: true

agents:
  scout: installed
  worker: installed
  judge: installed

visual_board:
  selected: local
  local:
    status: generated
    url: "http://127.0.0.1:41737/cppad-api-test-architecture-reset/"
    command: "pwsh -NoProfile -ExecutionPolicy Bypass -File C:\\Users\\Tanner\\Documents\\git\\codex-maintenance\\scripts\\start-goalbuddy-board.ps1 -Goal docs/goals/cppad-api-test-architecture-reset"
  github_projects:
    status: not_requested
    url: null
    command: "npx goalbuddy extend github-projects"
