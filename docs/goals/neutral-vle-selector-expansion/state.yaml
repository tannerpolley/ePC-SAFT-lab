version: 2

goal:
  title: "Neutral VLE Selector Expansion"
  slug: "neutral-vle-selector-expansion"
  kind: existing_plan
  tranche: "Complete selector-owned neutral VLE bubble, dew, and two-phase flash production expansion from the approved plan."
  status: done
  intake:
    original_request: "Implement the Neutral VLE Selector Expansion plan."
    interpreted_outcome: "The public Equilibrium workflow exposes one solve(route=..., ...) method for certified selector-backed neutral VLE bubble/dew pressure/temperature specs and two-phase TP flash, with activation/capability/docs/tests aligned."
    input_shape: existing_plan
    audience: "epcsaft maintainers and downstream package consumers"
    authority: requested
    proof_type: test
    completion_proof: "Strict validation passes, GoalBuddy checker passes, role-owner review is recorded, local commits exist, and git status is clean."
    likely_misfire: "Adding Python wrappers or route-specific bindings that bypass selector ownership, or claiming flash capability before activation metadata and certification prove it."
    blind_spots_considered:
      - "TP flash seed generation must be selector/native-owned so public flash does not need a user seed."
      - "bubble_dew_derived_routes and neutral_tp_flash need distinct capability semantics."
      - "Direct old bubble/dew pybind route entrypoints must remain absent."
      - "Equilibrium.solve(route=..., ...) must be the only public equilibrium execution method."
      - "The hydrocarbon fixture must use equilibrium-consistent x/y/z, not one vector for every spec."
      - "Route additions must prove the existing production owner before code edits."
      - "Activation rows are selector admission metadata, not permission to invent standalone route families."
      - "Negative tests must reject direct flash bindings, selector bypass, standalone flash production routes, and optimizer-success-only acceptance."
    existing_plan_facts:
      - "First implementation action is GoalBuddy board setup."
      - "Use contract-test-first gates."
      - "Use an architecture preflight gate: owner-file proof, route-spec matrix, negative tests, activation-as-admission, and owner review before design lock."
      - "Use owner agents for native solver/backend, Python API/tests, build/package, and command validation."
      - "Replace selector route/scalar/composition with a typed native selector request."
      - "Public methods are spelled names only."
      - "Flash v1 is two-phase only and raises SolutionError for single-phase or degenerate outcomes."
      - "Neutral VLE production scope remains neutral, non-reactive, non-electrolyte, non-associating mixtures."

rules:
  pm_owns_state: true
  one_active_task: true
  max_write_workers: 1
  no_implementation_without_worker_or_pm_task: true
  no_completion_without_judge_or_pm_audit: true
  planning_is_not_completion: true
  queued_required_worker_blocks_completion: true
  continuous_until_full_outcome: true
  missing_input_or_credentials_do_not_stop_goal: true
  preserve_and_validate_existing_plan: true
  intake_misfire_must_be_audited: true
  slice_policy:
    max_consecutive_tiny_tasks: 2
    prefer_vertical_slices: true
    judge_picks_largest_safe_slice: true
    worker_completes_whole_slice: true

agents:
  scout: installed
  worker: installed
  judge: installed

