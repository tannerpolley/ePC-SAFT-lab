version: 2

goal:
  title: "Unified Equilibrium Roadmap Implementation"
  slug: "unified-equilibrium-roadmap-implementation"
  kind: existing_plan
  tranche: "continuous execution: implement verified modular slices until remaining unified equilibrium roadmap gaps are complete or blocked by source data"
  status: blocked
  intake:
    original_request: "Make plans to fully implement the blocked roadmap gaps using the existing modular Ipopt framework."
    interpreted_outcome: "A GoalBuddy-ready execution plan exists for universal certification, native reactive stability, and reactive LLE/electrolyte LLE production proof without parallel solver architecture."
    input_shape: existing_plan
    audience: "ePC-SAFT maintainers and downstream consumers"
    authority: requested
    proof_type: artifact
    completion_proof: "Plan artifact and board exist, validate, and name executable tasks that preserve the current native Ipopt route framework and capability evidence contract."
    likely_misfire: "Adding new solver surfaces, Python optimizer loops, or capability claims instead of extending the existing route-builder, stability, diagnostics, and benchmark layers."
    blind_spots_considered:
      - "Reactive stability needs a native coupled stability NLP, not staged speciation."
      - "Reactive LLE capability promotion depends on benchmark proof, not route-builder existence."
      - "Universal certification must not imply stability proof for routes that still lack it."
      - "Graphify is useful only if targeted source mapping becomes stale; the current plan uses the fresh audit and targeted source reads."
      - "Native _core rebuilds must be coordinated by the main thread."
    existing_plan_facts:
      - "Detailed plan path: docs/superpowers/plans/2026-05-20-unified-equilibrium-roadmap-implementation.md."
      - "Prior roadmap audit board closed with D001 native coupled reactive stability NLP, D002 reactive LLE production registration, and D003 universal stability certification as larger remaining gaps."
      - "The current implementation has native Ipopt route builders, stability TPD builders, reactive phase residual surfaces, route metadata, pybind route payloads, and shared native_results diagnostics."

rules:
  pm_owns_state: true
  one_active_task: true
  max_write_workers: 1
  no_implementation_without_worker_or_pm_task: true
  no_completion_without_judge_or_pm_audit: true
  planning_is_not_completion: true
  queued_required_worker_blocks_completion: true
  continuous_until_full_outcome: false
  missing_input_or_credentials_do_not_stop_goal: false
  preserve_and_validate_existing_plan: true
  intake_misfire_must_be_audited: true
  slice_policy:
    max_consecutive_tiny_tasks: 2
    prefer_vertical_slices: true
    judge_picks_largest_safe_slice: true
    worker_completes_whole_slice: true

agents:
  scout: installed
  worker: installed
  judge: installed

visual_board:
  selected: local
  local:
    status: generated
    url: "http://127.0.0.1:41737/unified-equilibrium-roadmap-implementation/"
    command: "pwsh -NoProfile -ExecutionPolicy Bypass -File C:\\Users\\Tanner\\Documents\\git\\codex-maintenance\\scripts\\start-goalbuddy-board.ps1 -Goal docs/goals/unified-equilibrium-roadmap-implementation"
  github_projects:
    status: not_requested
    url: null
    command: "npx goalbuddy extend github-projects"
    missing: []

active_task: null

