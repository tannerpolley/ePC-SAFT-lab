version: 2

goal:
  title: "Implement package extension transfer roadmap phases 0-3"
  slug: "package-extension-transfer-phases-0-3"
  kind: existing_plan
  tranche: "Complete the pre-extraction gate for roadmap phases 0-3: external org readiness inventory, split contract docs, provider and native/build contract freeze, GFPE cleanup evidence audit, and internal package-boundary proof inside this repo."
  status: done
  intake:
    original_request: "Read docs/roadmaps/package_extension_transfer_roadmap.md, create a plan to implement phases 0-3 with a GoalBuddy board using subagents, GitHub, and grill-me, then revise the board to include all local pre-extraction steps needed before equilibrium becomes its own package extension."
    interpreted_outcome: "A ready-to-run GoalBuddy board exists with an explicit pre-extraction phase plan, gates, subagent-safe discovery tasks, and sequential Worker slices that stop only when equilibrium extraction readiness is proven or externally blocked with evidence."
    input_shape: existing_plan
    audience: "repo maintainers and downstream package consumers"
    authority: requested
    proof_type: artifact
    completion_proof: "Phase 0 prerequisites are evidenced or blocked; Phase 1 ADR/docs ownership split lands; Phase 2 provider, extension compatibility, and native/build boundary docs/tests pass; Phase 3 boundary proof passes provider-only, equilibrium, regression, and integration validation; final audit proves epcsaft-equilibrium can be extracted through documented seams with no hidden compatibility path, route-local acceptance assembly, or undocumented core dependency."
    likely_misfire: "Stop after ADR/docs, start moving code before ownership, contract, and validation gates are explicit, or require full GFPE completion instead of the narrower extraction-readiness gate."
    blind_spots_considered:
      - "Phase 0 is mostly external GitHub organization/admin work."
      - "Current docs still treat regression and equilibrium as core package capabilities."
      - "Publishing and metadata still point at tannerpolley/ePC-SAFT."
      - "Phase 2 and Phase 3 need explicit Judge gates."
      - "GFPE cleanup already centralized selector admission, Ipopt acceptance, and result bridging, but provider/native extraction contracts are still not frozen."
      - "The extension split needs a native linkage/build decision, not only Python import-boundary tests."
      - "The worktree already contains a user-owned FULL_ROADMAP modification."
    existing_plan_facts:
      - "The roadmap defines the dependency order ADR -> source-of-truth docs -> provider API -> internal boundaries -> transfer -> extraction -> coordinated releases."
      - "The first implementation PR should not move production code."
      - "Long-lived compatibility wrappers are out of policy."
      - "Extraction readiness is not full GFPE completion; remaining GFPE contribution-family decomposition and HELD work can stay post-extraction if the provider/result/Ipopt/boundary contracts are stable."

rules:
  pm_owns_state: true
  one_active_task: true
  max_write_workers: 1
  no_implementation_without_worker_or_pm_task: true
  no_completion_without_judge_or_pm_audit: true
  planning_is_not_completion: true
  queued_required_worker_blocks_completion: true
  continuous_until_full_outcome: true
  missing_input_or_credentials_do_not_stop_goal: true
  preserve_and_validate_existing_plan: true
  intake_misfire_must_be_audited: true
  slice_policy:
    max_consecutive_tiny_tasks: 2
    prefer_vertical_slices: true
    judge_picks_largest_safe_slice: true
    worker_completes_whole_slice: true

agents:
  scout: installed
  worker: installed
  judge: installed

visual_board:
  selected: local
  local:
    status: generated
    url: "file:///C:/Users/Tanner/Documents/Workspaces/Engineering/ePC-SAFT/docs/goals/package-extension-transfer-phases-0-3/.goalbuddy-board/index.html"
    command: "& C:\\Users\\Tanner\\Documents\\git\\codex-maintenance\\scripts\\start-goalbuddy-board.ps1 -Goal docs/goals/package-extension-transfer-phases-0-3"
  github_projects:
    status: not_requested
    url: null
    command: "npx goalbuddy extend github-projects"
    missing: []

active_task: null

tasks:
  - id: T001
    type: judge
    assignee: Judge
    status: done
    reasoning_hint: high
    objective: "Validate the revised pre-extraction sequencing for phases 0-3, resolve first-PR boundary ambiguity, and define the first approved execution gate."
    inputs:
      - "docs/roadmaps/package_extension_transfer_roadmap.md"
      - "docs/roadmaps/FULL_ROADMAP.md"
      - "docs/roadmaps/gfpe_package_cleanup_plan.md"
      - "docs/roadmaps/generalized_fluid_phase_equilibrium.md"
      - "docs/protocols/build_package_dependency_protocol.rst"
      - "docs/pages/development_workflows.rst"
      - "docs/pages/package_architecture.rst"
      - "docs/pages/equilibrium_architecture.rst"
      - "README.md"
      - "pyproject.toml"
      - "docs/pages/publishing.rst"
      - "docs/agents/issue-tracker.md"
    constraints:
      - "Read-only."
      - "Do not implement."
      - "Preserve the roadmap dependency order."
      - "Decide whether the first Worker slice is docs-only or docs-plus-contract-tests."
      - "Decide which GFPE cleanup work is a pre-extraction blocker versus post-extraction cleanup."
    expected_output:
      - "Decision"
      - "Phase 0/1/2/3 pre-extraction gate summary"
      - "Exact first Worker objective"
      - "allowed_files"
      - "verify"
      - "stop_if"
      - "GFPE blocker versus post-extraction cleanup split"
      - "Open question to raise with the operator if needed"
    receipt:
      result: done
      decision: "Proceed with the staged pre-extraction plan. The first repo-writing Worker remains Phase 1 docs/ADR/publishing/metadata alignment only; Phase 2 provider/native contracts and Phase 3 boundary tests must wait for the Scout evidence and T050/T070/T090 Judge gates."
      summary:
        - "The roadmap dependency order is still valid: contract decision first, provider/native contract second, internal boundary proof third, extraction readiness last."
        - "Current source docs still contradict the split: package_architecture.rst says one installable distribution, build_package_dependency_protocol.rst says regression and equilibrium are core package capabilities, README.pyproject/publishing/issue-tracker still point at tannerpolley/ePC-SAFT."
        - "GFPE cleanup is partly ahead of the package split: selector admission, Ipopt acceptance, and result certification are already central cleanup themes, but they still need an explicit blocker/deferred-cleanup audit before extraction readiness is claimed."
      evidence:
        - "docs/roadmaps/package_extension_transfer_roadmap.md defines Phase 1 before provider contract and internal boundary work."
        - "docs/protocols/build_package_dependency_protocol.rst still states regression and equilibrium are core package capabilities."
        - "docs/pages/package_architecture.rst still states epcsaft remains one installable distribution."
        - "docs/roadmaps/gfpe_package_cleanup_plan.md states full GFPE cleanup includes selector admission, shared NLP, Ipopt adapter, certified results, contribution families, validation boundaries, frontend boundary, and deletion pass."
      phase_gate_summary:
        - "Phase 0: external GitHub/org prerequisites need Scout evidence before local repo writes depend on them."
        - "Phase 1: ADR and source-of-truth docs must establish core/equilibrium/regression ownership without claiming extraction is already complete."
        - "Phase 2: provider API v1, extension compatibility, and native/build boundary contracts must be frozen after Phase 1."
        - "Phase 3: boundary tests/refactors must prove provider-only, equilibrium, regression, and explicit integration lanes before extraction."
      first_worker_objective: "T060: Land the Phase 1 contract decision slice across ADRs, source-of-truth docs, publishing docs, metadata, and issue-tracker guidance."
      allowed_files:
        - "Use T060.allowed_files after T050 approves Scout evidence."
      verify:
        - "Use T060.verify after T050 approves Scout evidence."
      stop_if:
        - "Do not start T060 before T010/T020/T030/T040/T045 evidence and T050 approval."
        - "Ask the operator only if Phase 0 external GitHub/admin permissions are needed for an external write."
      gfpe_blocker_split:
        - "Pre-extraction blocker candidates: selector admission authority, centralized Ipopt acceptance, centralized result/diagnostics bridge, public frontend boundary, provider API, native/build linkage, and import/dependency boundaries."
        - "Likely post-extraction cleanup: full HELD production generalization, contribution-family decomposition beyond extraction seams, validation-script formalization, and deeper private route-file cleanup."
      open_question: "None for local execution; GitHub admin credentials or org permissions may become external blockers during T010."

  - id: T010
    type: scout
    assignee: Scout
    status: done
    reasoning_hint: low
