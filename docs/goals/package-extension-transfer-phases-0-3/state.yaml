      - "docs/agents/issue-tracker.md"
      - "GitHub plugin surfaces"
    constraints:
      - "Read-only."
      - "No external writes."
      - "Return a checklist of done, missing, and blocked external prerequisites."
    expected_output:
      - "Phase 0 checklist"
      - "Blocked external prerequisites"
      - "Repo-local follow-ups"
    receipt:
      result: done
      summary:
        - "The current source repository is still tannerpolley/ePC-SAFT, public, default branch main, and the local viewer has ADMIN permission."
        - "The target organization ePC-SAFT exists, the authenticated user has active admin org membership, the target repository ePC-SAFT/ePC-SAFT does not exist, and gh repo list ePC-SAFT returns no repositories."
        - "Organization governance is not ready: no teams are present, no public repositories exist, organization default repository permission is read, members_can_create_repositories is true, and two-factor requirement is false."
        - "Current repo external inventory: no repo Actions secrets, no repo Actions variables, one pypi environment, no GitHub Pages site, no webhooks, no deploy keys, no branch protection on main, no repository rulesets, active release tags v0.2.0 through v0.1.0, and three active workflows."
        - "GitHub connector token is expired, but local gh CLI auth works for repo/org reads. Org Project V2 read requires read:project scope; org rulesets require admin:org scope."
      evidence:
        - "git remote -v -> origin https://github.com/tannerpolley/ePC-SAFT.git"
        - "gh repo view tannerpolley/ePC-SAFT -> viewerPermission ADMIN, visibility PUBLIC, defaultBranchRef main"
        - "gh api orgs/ePC-SAFT -> public_repos 0, default_repository_permission read, members_can_create_repositories true, two_factor_requirement_enabled false"
        - "gh api /user/memberships/orgs/ePC-SAFT -> state active, role admin"
        - "gh repo view ePC-SAFT/ePC-SAFT -> repository not found"
        - "gh repo list ePC-SAFT --limit 50 -> []"
        - "gh api orgs/ePC-SAFT/teams -> []"
        - "gh api repos/tannerpolley/ePC-SAFT/branches/main/protection -> Branch not protected"
      blocked_external_prerequisites:
        - "Reconnect GitHub connector token in Codex if future tasks must use the connector instead of gh CLI."
        - "Refresh gh scopes with read:project before verifying or creating the organization Project V2 board."
        - "Refresh gh scopes with admin:org before reading or changing organization rulesets."
        - "External org setup still needed before transfer: create teams, decide/lock repository creation policy, enable desired 2FA policy, create organization project and fields, and configure shared labels or rulesets if required."
      repo_local_followups:
        - "Phase 1 docs must update old tannerpolley/ePC-SAFT references in README, pyproject, publishing docs, and issue-tracker guidance."
        - "Branch protection and CI requirements must be planned before transfer because current main is not protected."
        - "The pypi environment and publish workflow must be audited during Phase 1 because PyPI trusted-publisher docs still point at tannerpolley/ePC-SAFT."

  - id: T020
    type: scout
    assignee: Scout
    status: done
    reasoning_hint: low
    objective: "Map every Phase 1 source-of-truth file that currently contradicts the split ownership model."
    inputs:
      - "docs/roadmaps/package_extension_transfer_roadmap.md"
      - "docs/roadmaps/FULL_ROADMAP.md"
      - "docs/protocols/build_package_dependency_protocol.rst"
      - "docs/pages/package_architecture.rst"
      - "docs/pages/package_guide.rst"
      - "docs/pages/equilibrium_architecture.rst"
      - "docs/pages/parameter_regression.rst"
      - "docs/pages/project_structure.rst"
      - "docs/pages/development_workflows.rst"
      - "docs/pages/publishing.rst"
      - "README.md"
      - "pyproject.toml"
      - ".github/workflows/publish-pypi.yml"
      - "docs/agents/issue-tracker.md"
    constraints:
      - "Read-only."
      - "Prefer file-path evidence over summaries."
    expected_output:
      - "Exact file list"
      - "Contradiction map"
      - "Canonical source-of-truth hierarchy for split ownership"
      - "Suggested Phase 1 edit grouping"
    receipt:
      result: done
      summary:
        - "Phase 1 needs one coherent contract-decision edit group. The source docs currently mix the future package split roadmap with current one-package/core-capability doctrine."
        - "The clearest contradictions are package_architecture.rst, build_package_dependency_protocol.rst, README.md, pyproject.toml, publishing.rst, publish-pypi.yml, and issue-tracker.md."
        - "Equilibrium architecture and GFPE docs mostly align with the future equilibrium-extension ownership, but they still describe current public APIs through epcsaft and must be framed as current-monorepo transition until extraction."
      evidence:
        - "docs/pages/package_architecture.rst states epcsaft remains one installable distribution and avoids splitting EOS/equilibrium/regression into separate packages."
        - "docs/protocols/build_package_dependency_protocol.rst states native regression and production native equilibrium are core package capabilities."
        - "README.md describes package-owned equilibrium/regression kernels and links tagged installs to github.com/tannerpolley/ePC-SAFT."
        - "pyproject.toml project URLs point Homepage and Repository at github.com/tannerpolley/ePC-SAFT."
        - "docs/pages/publishing.rst and .github/workflows/publish-pypi.yml describe PyPI trusted publishing for tannerpolley/ePC-SAFT."
        - "docs/agents/issue-tracker.md says issues and new tracker output live in tannerpolley/ePC-SAFT."
      exact_file_list:
        - "docs/adr/0005-package-extension-split.md"
        - "docs/roadmaps/FULL_ROADMAP.md"
        - "docs/roadmaps/package_extension_transfer_roadmap.md"
        - "docs/roadmaps/gfpe_package_cleanup_plan.md"
        - "docs/protocols/build_package_dependency_protocol.rst"
        - "docs/pages/package_architecture.rst"
        - "docs/pages/package_guide.rst"
        - "docs/pages/equilibrium_architecture.rst"
        - "docs/pages/parameter_regression.rst"
        - "docs/pages/project_structure.rst"
        - "docs/pages/development_workflows.rst"
        - "docs/pages/publishing.rst"
        - "README.md"
        - "pyproject.toml"
        - ".github/workflows/publish-pypi.yml"
        - "docs/agents/issue-tracker.md"
      contradiction_map:
        - "One-package doctrine: package_architecture.rst and build_package_dependency_protocol.rst explicitly treat equilibrium/regression as core package subsystems."
        - "Future split doctrine: package_extension_transfer_roadmap.md assigns equilibrium to epcsaft-equilibrium and regression to epcsaft-regression."
        - "Public API examples: package_guide.rst, equilibrium_architecture.rst, parameter_regression.rst, README.md expose Equilibrium and Regression from epcsaft; Phase 1 must label these as current transition APIs or define deprecation/removal policy."
        - "Publishing/metadata owner: README.md, pyproject.toml, publishing.rst, publish-pypi.yml, and issue-tracker.md still use tannerpolley/ePC-SAFT."
        - "Build dependency ownership: development_workflows.rst and build_package_dependency_protocol.rst currently make Ceres/CppAD/Ipopt the default source-checkout dependency profile; Phase 1 must distinguish current monorepo validation from final package ownership."
      canonical_source_hierarchy:
        - "ADR 0005 should be the decision authority for split ownership and compatibility/deprecation policy."
        - "FULL_ROADMAP.md should summarize the adopted split and point to ADR 0005, package_extension_transfer_roadmap.md, and GFPE docs."
        - "build_package_dependency_protocol.rst should define current monorepo build truth and future package-specific ownership without claiming extraction has happened."
        - "package_architecture.rst should distinguish current monorepo transition layout from final core/equilibrium/regression package ownership."
        - "publishing.rst, pyproject.toml, README.md, publish-pypi.yml, and issue-tracker.md should carry repository-owner transition notes and avoid stale canonical owner claims."
      suggested_phase1_edit_grouping:
        - "Add ADR 0005 first: explicit packages, no namespace split for now, current top-level exports are transition APIs unless the ADR chooses a deprecation window, CppAD/provider derivatives remain core."
        - "Update architecture/build docs second: current monorepo dependency profile remains valid for development, but final Ceres ownership is regression and final Ipopt ownership is equilibrium."
        - "Update publishing/metadata/repo owner docs third: record current repo owner and future ePC-SAFT/ePC-SAFT target without breaking current release commands before actual transfer."
        - "Update README/user docs last: explain current imports versus future extension ownership without advertising packages that do not exist yet."

  - id: T030
    type: scout
    assignee: Scout
    status: done
    reasoning_hint: low
    objective: "Map the future owner of each current public provider, equilibrium, and regression surface that must be frozen before Phase 2."
    inputs:
      - "docs/roadmaps/package_extension_transfer_roadmap.md"
      - "CONTEXT.md"
      - "docs/adr/"
      - "README.md"
      - "pyproject.toml"
      - "src/epcsaft"
      - "tests"
    constraints:
      - "Read-only."
      - "Do not propose new public APIs beyond the roadmap contract."
    expected_output:
      - "Current public surface map"
      - "Future owner map"
      - "Provider API v1 candidate contract"
      - "Capability-report implications"
    receipt:
      result: done
      summary:
        - "The current public root exports mix three future packages: provider surfaces, equilibrium workflow surfaces, and regression workflow surfaces all leave through epcsaft today."
        - "The provider API v1 candidate is not a new user API; it is the stable extension-consumption contract around ParameterSet, ModelOptions, Mixture, State, derivative/result schemas, errors, runtime metadata, and native provider access."
        - "The split must move ownership of Equilibrium and regression target/fit/result surfaces out of core at a coordinated release boundary, rather than preserving long-lived core wrappers."
      current_public_surface_map:
        - "Core/provider today: epcsaft.ParameterSet, ModelOptions, MissingModelParameterError, Mixture, State, InputError, SolutionError, create_input_template, runtime_build_info, capabilities, and __version__."
        - "State/provider methods today: density and pressure closure, z/compressibility_factor, residual Helmholtz/Gibbs/enthalpy/entropy, contribution maps, ln fugacity coefficients, fugacity coefficients, and CppAD-backed derivative-result methods."
        - "Equilibrium today: epcsaft.Equilibrium plus epcsaft.equilibrium EquilibriumSolverOptions, EquilibriumPhase, EquilibriumResult, internal problem/structure objects, selector route normalization, diagnostics, certification, and phase payload conversion."
        - "Regression today: epcsaft.Regression plus epcsaft.regression star-exported records, bounds, target rows/datasets, fit problems/results, provenance helpers, fit_pure_neutral, fit_pure_parameters, fit_pure_ion, fit_binary_parameters, fit_binary_pair, fit_liquid_electrolyte_parameters, derivative evaluation, and result writing."
        - "Runtime/capability today: epcsaft.capabilities reports provider derivatives, Ceres-backed regression claims, Ipopt-backed equilibrium claims, activation metadata, validation lanes, and evidence summaries in one payload."
      future_owner_map:
        - "epcsaft core owns ParameterSet, component/binary/permittivity records, ModelOptions, Mixture, State, EOS/property evaluation, density/pressure closures, fugacity/activity/chemical-potential provider functions, contribution traces, exact derivative substrate, runtime_build_info, provider-level capabilities, errors, and provider ABI/version contracts."
        - "epcsaft-equilibrium owns Equilibrium, route specs, solver options, route admission, phase discovery/stability evidence, GFPE assembly, Ipopt option/profile policy, NLP/result/certification schemas, route diagnostics, and equilibrium capability reports."
        - "epcsaft-regression owns Regression, TargetRow, TargetDataset, fit problem/result schemas, target-family summaries, parameter maps/bounds, Ceres residual blocks, regression diagnostics, result writing, and regression capability reports."
        - "CppAD and implicit state-sensitivity machinery remain core-owned because both extension packages consume derivative-capable EOS/state provider functions."
        - "Any regression lane that requires VLE, LLE, reactive, or speciation solves becomes an explicit optional integration between epcsaft-regression and epcsaft-equilibrium, not a default regression dependency on Ipopt."
      provider_api_v1_candidate_contract:
        - "Versioning: package version, provider contract version, native provider ABI version, and explicit extension compatibility ranges."
        - "Inputs: ParameterSet schemas and to_runtime_dict payload, ModelOptions schema, component ordering, phase labels, state variables, and serializable parameter provenance."
        - "Provider objects: Mixture construction and State construction remain the public high-level provider boundary; native handles are accessed only through a documented adapter contract, not arbitrary private _core calls."
        - "Outputs: property values, contribution traces, density/pressure closure metadata, fugacity/activity/chemical-potential outputs, derivative-result shapes, diagnostics, and package-standard InputError/SolutionError semantics."
        - "Derivatives: supported derivative variables, backend labels, CppAD/implicit sensitivity evidence, Hessian/Jacobian availability flags, and exact-derivative failure behavior must be versioned and serializable."
        - "Native extension seam: extension builds need a stable provider target/header/binding policy; random pybind smoke functions and private native route helpers are not the provider contract."
      capability_report_implications:
        - "After split, epcsaft.capabilities should report core/provider capability only plus optional installed-extension discovery only if explicit and test-backed."
        - "Equilibrium and regression extension packages should expose their own capability reports for Ipopt routes and Ceres fit routes."
        - "Current capability_evidence rows that mention Equilibrium, Ipopt routes, Ceres regression, activation families, and regression target kinds need owner reassignment during Phase 1/2 docs and tests."
        - "Capability claims must not broaden because a dependency is present; the owning package must provide evidence-backed route or target rows."
      evidence:
        - "src/epcsaft/__init__.py root __all__ currently exports both core provider objects and Equilibrium/Regression."
        - "src/epcsaft/frontend/equilibrium.py exposes only Equilibrium(mixture, route=...).solve() and blocks non-exact Hessian results."
        - "src/epcsaft/frontend/regression.py exposes Regression(mixture).fit_pure_neutral and derivative evaluation while blocking backend-selection options."
        - "src/epcsaft/regression/__init__.py currently star-exports the regression core module, so Phase 2 must explicitly classify those names before extraction."
        - "src/epcsaft/runtime/core.py currently combines provider derivative, Ceres regression, Ipopt equilibrium, activation, and validation-lane capability evidence."
        - "docs/roadmaps/package_extension_transfer_roadmap.md assigns end-state ownership to epcsaft, epcsaft-equilibrium, and epcsaft-regression and forbids long-lived compatibility wrappers."
        - "CONTEXT.md still describes the current reset frontend as one epcsaft import surface, which Phase 1 must frame as transition-state language."

  - id: T040
    type: scout
    assignee: Scout
    status: done
    reasoning_hint: low
    objective: "Map the current Ceres/Ipopt coupling points, native provider linkage choices, provider-only runtime expectations, and Phase 3 validation lanes."
    inputs:
      - "docs/roadmaps/package_extension_transfer_roadmap.md"
      - "docs/protocols/build_package_dependency_protocol.rst"
      - "docs/pages/development_workflows.rst"
      - "pyproject.toml"
      - "CMakeLists.txt"
      - "src/epcsaft/native"
      - "scripts/dev/validate_project.py"
      - "tests/native/contracts"
      - "tests/workflows"
    constraints:
      - "Read-only."
      - "Identify provider-only, equilibrium, regression, and integration proof commands."
      - "Do not choose a build/linkage design without showing tradeoffs."
    expected_output:
      - "Coupling map"
      - "Native extension linkage options and recommended first target"
      - "Validation-lane map"
      - "Phase 3 exit-proof checklist"
    receipt:
      result: done
      summary:
        - "Current Python import boundaries are partly prepared, but native/build ownership is still a single package target: one epcsaft_native object library and one _core pybind module bundle provider, CppAD, Ceres regression, and Ipopt equilibrium code."
        - "A provider-only runtime claim is not yet proven by the build system. The release wheel path can disable local Ipopt, but Ceres and CppAD are still required by default and Ceres OFF is explicitly unsupported."
        - "The next build-boundary target should be a logical target split inside this repo before separate pybind modules or repositories are attempted."
      coupling_map:
        - "CMakeLists.txt defines EPCSAFT_ENABLE_CERES ON and rejects OFF, then links Ceres::ceres into epcsaft_native and defines EPCSAFT_HAS_CERES."
        - "CMakeLists.txt defines EPCSAFT_ENABLE_CPPAD ON and rejects OFF, then compiles CppAD includes/source into the same epcsaft_native/_core target family."
        - "CMakeLists.txt defines EPCSAFT_ENABLE_IPOPT ON by default, supports system Ipopt only, links the resolved Ipopt target into epcsaft_native, and defines EPCSAFT_HAS_IPOPT."
        - "EPCSAFT_NATIVE_SOURCES combines model, EOS, autodiff, equilibrium, and regression source lists before add_library(epcsaft_native OBJECT ...)."
        - "_core is built from src/epcsaft/native/bindings/module.cpp and src/epcsaft/native/equilibrium/register_bindings.cpp, then links the whole epcsaft_native object library."
        - "src/epcsaft/native/bindings/module.cpp exposes provider/native state methods plus _fit_*_native_ceres bindings and calls register_equilibrium_bindings(m)."
        - "src/epcsaft/native/equilibrium/register_bindings.cpp exposes selector, activation, Ipopt smoke, NLP, phase-discovery, postsolve, and route-result bindings."
        - "build_backend/epcsaft_build_backend.py disables Ipopt for default PEP 517 builds when no local/system Ipopt is selected, but it still forces Ceres and CppAD ON."
        - "scripts/dev/build_dist.py strips local Ipopt for the normal release baseline while preserving Ceres/CppAD build requirements."
      native_extension_linkage_options:
        - "Option A, keep the monolithic _core target until extraction: lowest immediate churn, but it does not prove provider-only install or dependency ownership."
        - "Option B, split logical native targets inside this repo while keeping one pybind module temporarily: create provider/autodiff, equilibrium/Ipopt, and regression/Ceres CMake targets with explicit dependencies; this is the recommended first target because it proves ownership without cross-repo churn."
        - "Option C, create separate pybind modules inside this repo before package extraction: closer to final package shape, but high churn before provider ABI and result contracts are frozen."
        - "Option D, export an installed core native library and link extension pybind modules against it: closest to final repository split, but too early until provider ABI/versioning and package compatibility docs exist."
      recommended_first_target:
        - "After Phase 1 docs and Phase 2 provider contract tests, implement Option B: logical CMake target separation in the current repo with one public wheel path, plus tests that prove provider target code has no Ceres or Ipopt linkage and extension targets own those solvers."
      provider_only_runtime_expectations:
        - "Core/provider imports should expose ParameterSet, ModelOptions, Mixture, State, create_input_template, runtime_build_info, and provider-level capabilities without importing epcsaft.equilibrium, epcsaft.regression, or state.native_adapter until those objects are used."
        - "Core/provider package installation must eventually pass without Ceres and Ipopt. That is not true in current CMake because Ceres OFF is unsupported and CppAD remains required."
        - "CppAD remains core-owned for derivative-capable provider behavior, so provider-only does not mean no native derivative substrate."
        - "Ipopt-free package boundary proof exists only as a release/smoke lane today; it is not an equilibrium production proof."
      validation_lane_map:
        - "Generic/quick: uv run python scripts/dev/validate_project.py quick, which runs doctor plus the generic pytest slice and samples API, native, regression, equilibrium metadata, workflow structure, and build-command contracts."
