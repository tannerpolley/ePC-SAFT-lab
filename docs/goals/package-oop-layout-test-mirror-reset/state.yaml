  slug: "package-oop-layout-test-mirror-reset"
  kind: existing_plan
  tranche: "continuous execution: reset the public OOP interface, source skeleton, mirrored tests, shared support fixtures, and focused proof path"
  status: done
  intake:
    original_request: "PLEASE IMPLEMENT THIS PLAN: Package OOP Layout And Test Mirror Reset"
    interpreted_outcome: "The package uses direct public workflow constructors, a clean package/test skeleton, state residual property methods, and shared focused test support."
    input_shape: existing_plan
    audience: "ePC-SAFT package maintainers and downstream package users"
    authority: requested
    proof_type: test
    completion_proof: "Focused tests prove direct constructors, hydrocarbon State residual properties/contributions, trusted bubble/IPOPT route, hydrocarbon regression anchor, and project quick validation."
    likely_misfire: "Moving files into a prettier tree while leaving public factory methods, scattered parameter fixtures, or default paper-validation tests behind."
    blind_spots_considered:
      - "Mixture must not own thermodynamic state conditions."
      - "Private skeleton modules must not become public capability promises."
      - "State docstrings should describe thermodynamic behavior, not implementation internals."
      - "Shared fixtures must replace hard-coded parameter tables in API tests."
      - "Broad paper validation is not default pytest proof."
    existing_plan_facts:
      - "Direct constructors are canonical: Mixture, State, Equilibrium, Regression."
      - "State exposes z, ares, hres, sres, gres, and residual Helmholtz contribution access."
      - "Source and tests should mirror package concepts."
      - "Future equilibrium types get private skeleton modules until implemented."

rules:
  pm_owns_state: true
  one_active_task: true
  max_write_workers: 1
  no_implementation_without_worker_or_pm_task: true
  no_completion_without_judge_or_pm_audit: true
  planning_is_not_completion: true
  queued_required_worker_blocks_completion: true
  continuous_until_full_outcome: true
  missing_input_or_credentials_do_not_stop_goal: true
  preserve_and_validate_existing_plan: true
  intake_misfire_must_be_audited: true
  slice_policy:
    max_consecutive_tiny_tasks: 2
    prefer_vertical_slices: true
    judge_picks_largest_safe_slice: true
    worker_completes_whole_slice: true

