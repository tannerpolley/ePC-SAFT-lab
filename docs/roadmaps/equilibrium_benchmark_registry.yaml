schema_version: 1
source_document: "docs/roadmaps/generalized_fluid_phase_equilibrium.md"
policy:
  generalized_matrix_split:
    - phase_only
    - chemical_only
    - combined_phase_chemical
  bubble_dew_policy: "Derived utility routes stay tested in the existing selector surface but are excluded from generalized PE/CE/CPE activation rows."
  documentation_scope: "canonical_doctrine_registry_schema_tests_only"

excluded_derived_utility_route_keys:
  - bubble_dew_derived_routes
  - bubble_pressure
  - bubble_temperature
  - dew_pressure
  - dew_temperature

activation_status_vocabulary:
  production_exposed: "Public route selection is allowed after exact derivative and postsolve certification proof."
  diagnostic_only: "Internal helper or diagnostic row only; cannot return production_accepted by itself."
  planned_not_public: "Roadmap row with no public selector exposure."
  blocked_not_implemented: "Explicitly blocked until named proof gates pass."
  source_data_needed: "A source-backed target exists but local executable fixture data are missing."

evidence_tiers:
  T0:
    name: documented_design_or_inventory
    production_eligible: false
  T1:
    name: executable_package_fixture
    production_eligible: true
  T2:
    name: source_digitized_reference
    production_eligible: true
  T3:
    name: reproduced_literature_curve_or_table
    production_eligible: true

activation_rows:
  - key: PE-01
    category: phase
    route_family: neutral_tp_flash
    exposure: public
    activation_status: production_exposed
    production_exposed: true
    phase_kinds: [liquid, vapor]
    phase_count_policy: two_phase
    species_basis_policy: neutral_true_species
    species_classes: [neutral, nonelectrolyte, nonreactive, nonassociating]
    knowns: [T, P, feed_composition]
    primary_variables: [phase_species_amounts, phase_volumes]
    optional_variables: []
    variable_model: phase_species_amounts_plus_phase_volume
    objective_family: pressure_transformed_helmholtz
    hard_constraints: [material_balance, phase_pressure_consistency, phase_equilibrium]
    optional_constraints: [phase_distance_anti_collapse]
    residual_blocks: [material_balance, pressure, fugacity_equality, phase_distance]
    phase_discovery_backend: held_tpd_volume_composition
    seed_generators: [hydrocarbon_reference_seed, held_tpd_candidates]
    stability_checks: [tpd_postsolve, candidate_mass_balance]
    certification_families: [postsolve_checks, material_balance, phase_pressure_consistency, neutral_fugacity_equality, tpd_stability, phase_set_completeness]
    thermo_provider_contract: pcsaft_helmholtz_eos
    derivative_contract: exact_gradient_jacobian_hessian
    internal_state_policy: no_association_no_charge_no_reaction
    proof_cases:
      - key: hydrocarbon_tp_flash_reference
        evidence_tier: T1
        source: tests/support/hydrocarbon_cases.py
        rows: [PE-01]
        acceptance_checks: [accepted_status, exact_hessian, material_balance, pressure_consistency, fugacity_equality, tpd_postsolve, hydrocarbon_flash_maps_to_PE-01]
        fixture_status: available
    required_evidence: [exact_derivatives, executable_fixture, postsolve_certification]
    forbidden_shortcuts: [optimizer_success_only, route_claim_without_tpd_postsolve]

