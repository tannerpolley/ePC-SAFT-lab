- family_label: CPE Simultaneous Phase-Chemistry Contract
  family_kind: combined_phase_chemical_equilibrium
  scope: Simultaneous phase split and chemical/speciation equilibrium after PE and CE validation gates exist.
  primary_problem: Combined phase and reaction equilibrium.
  knowns:
  - T
  - P
  - feed_composition
  - reaction_set
  physical_variables:
  - phase_species_amounts
  - phase_volumes
  - reaction_variables
  objective_family: pressure_transformed_helmholtz_with_reaction_affinity
  hard_constraints:
  - material_balance
  - phase_pressure_consistency
  - transferable_potential_equality
  - reaction_affinity
  derivative_contract: exact_coupled_derivatives_required_before_exposure
  phase_discovery_status: blocked_until_pe_and_ce_validation_gates
  required_gates:
  - pe_family_validation
  - ce_family_validation
  - phase_equilibrium_validation
  - chemical_equilibrium_validation
  - standard_state_registry
  - reaction_affinity_certification
  - coupled_phase_reaction_certification
  - exact_coupled_derivatives
  - simultaneous_objective_certification
  activation_dependencies:
    phase_equilibrium:
    - held_stage_i_stability
    - held_stage_ii_dual_phase_discovery
    - held_stage_iii_ipopt_refinement
    - postsolve_phase_set_certification
    chemical_equilibrium:
    - standard_state_registry
    - reaction_affinity_certification
    - exact_chemical_potential_derivatives
    - ce_validation_ladder
  interface_contract:
    status: blocked_future_interface
    spec_path: docs/contracts/cpe-interface.md
    must_solve_simultaneously: true
    variables:
    - phase_species_amounts
    - phase_volumes
    - reaction_variables
    constraints:
    - material_balance
    - phase_pressure_consistency
    - transferable_potential_equality
    - reaction_affinity
    - phase_charge_when_applicable
    pe_blockers:
    - held_stage_i_stability
    - held_stage_ii_dual_phase_discovery
    - held_stage_iii_ipopt_refinement
    - postsolve_phase_set_certification
    ce_blockers:
    - standard_state_registry
    - reaction_affinity_certification
    - exact_chemical_potential_derivatives
    - ce_validation_ladder
    disallowed_evidence:
    - phase_only_validation
    - ce_only_validation
    - sequential_speciation_plus_flash
  forbidden_shortcuts:
  - phase_only_validation_as_cpe_validation
  - ce_only_validation_as_cpe_validation
  - sequential_speciation_flash_as_simultaneous_cpe
