- family_label: CE Standalone Reactive Speciation
  family_kind: chemical_equilibrium
  scope: Internal homogeneous single-phase chemical-equilibrium validation; the live MEA final proof fails.
  primary_problem: Chemical equilibrium without phase split.
  knowns:
  - T
  - P
  - feed_composition
  - reaction_set
  physical_variables:
  - species_amounts
  - reaction_extents_or_element_basis
  objective_family: gibbs_or_helmholtz_chemical_equilibrium
  hard_constraints:
  - element_balance
  - reaction_affinity
  - standard_state_convention
  derivative_contract: exact_derivatives_required_before_exposure
  phase_discovery_status: not_applicable_homogeneous_single_phase
  required_gates:
