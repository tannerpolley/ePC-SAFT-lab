  phase_discovery_status: neutral_internal_sampled_candidate_replay_global_completeness_unproven
  required_gates:
  - infrastructure_gate
  - held_stage_i_stability
  - held_stage_ii_dual_phase_discovery
  - held_stage_iii_ipopt_refinement
