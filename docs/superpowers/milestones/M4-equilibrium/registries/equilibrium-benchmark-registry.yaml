schema_version: 2
source_document: "docs/superpowers/milestones/M4-equilibrium/generalized-fluid-phase-equilibrium.md"

policy:
  label_policy: "family_label values are planning labels only, not runtime keys or public route strings."
  generalized_status_policy: "Generalized family rows stay planned_not_public until full HELD-stage phase discovery, exact derivatives, and postsolve certification are proven."
  current_public_route_policy: "Existing public utility routes remain implemented and tested, but this registry does not treat them as generalized production exposure."
  deterministic_screening_policy: "Current deterministic TPD/candidate screening is seed and certification support, not full HELD."
  domain_safety_policy: "All generalized routes require route-owned bounds, a smooth VariableTransform wrapper, and Ipopt internal barrier handling of explicit bounds and constraints."
  custom_barrier_policy: "Production thermodynamic objectives must not include permanent custom barrier terms."
  documentation_scope: "canonical_doctrine_registry_schema_tests_only"

excluded_current_runtime_route_keys:
  - bubble_dew_derived_routes
  - bubble_pressure
  - bubble_temperature
  - dew_pressure
  - dew_temperature

activation_status_vocabulary:
  planned_not_public: "Planning family with no generalized production exposure."
  implemented_utility_not_generalized: "Existing public utility behavior may exist, but does not satisfy generalized admission gates."
  diagnostic_only: "Internal helper or diagnostic layer only."
  source_data_needed: "A source-backed target exists but local executable fixture data are missing."

evidence_tiers:
  T0:
    name: documented_design_or_inventory
    production_eligible: false
  T1:
    name: executable_package_fixture
    production_eligible: false
  T2:
    name: source_digitized_reference
    production_eligible: false
  T3:
    name: reproduced_literature_curve_or_table
    production_eligible: false

generalized_production_gates:
  - infrastructure_gate
  - continuous_tpd_minimization
  - held_stage_i_stability
  - held_stage_ii_dual_phase_discovery
  - held_stage_iii_ipopt_refinement
  - exact_gradient_jacobian_hessian
  - route_domain_bounds
  - variable_transform_chain_rule
  - ipopt_barrier_bounds_constraints
  - postsolve_phase_set_certification

family_rows:
  - family_label: "PE-Neutral TP Flash"
    family_kind: phase_equilibrium
    activation_status: planned_not_public
    production_exposed: false
    existing_public_utility_routes: [flash, lle]
    scope: "Neutral, nonelectrolyte, nonreactive TP flash plus neutral VLE/LLE validation ladder."
    primary_problem: "TP flash at fixed T, P, and feed composition."
    knowns: [T, P, feed_composition]
    physical_variables: [phase_species_amounts, phase_volumes]
    objective_family: pressure_transformed_helmholtz
    hard_constraints: [material_balance, phase_pressure_consistency, chemical_potential_equality]
    derivative_contract: exact_gradient_jacobian_hessian_required_before_generalized_exposure
    phase_discovery_status: continuous_tpd_stage_i_stage_ii_dual_loop_replay_verified_current_fixture
    phase_discovery_gate_status:
      deterministic_screening: implemented_seed_and_certification_support_not_full_held
      continuous_tpd_minimization: implemented_neutral_coordinate_search_convergence_required
      held_stage_i_stability: implemented_neutral_multi_start_convergence_required
      held_stage_ii_candidate_bound_audit: current_neutral_candidate_bound_audit_closed
      held_stage_ii_dual_phase_discovery: current_neutral_dual_loop_replay_verified_current_fixture
      held_stage_iii_ipopt_refinement: current_route_refinement_consumes_stage_ii_replay_with_ipopt_success
    required_gates:
      - infrastructure_gate
      - continuous_tpd_minimization
      - held_stage_i_stability
      - held_stage_ii_dual_phase_discovery
      - held_stage_iii_ipopt_refinement
      - postsolve_phase_set_certification
    reference_cases:
      - case_label: "Hydrocarbon workbook derived TP flash"
        evidence_tier: T1
        source: "data/reference/equilibrium_benchmarks/neutral_tp_flash/hydrocarbon_workbook_flash"
        source_model_family: PC-SAFT
        fixture_status: available
        acceptance_checks:
          - source_backed_parameters
          - material_balance
          - pressure_consistency
          - chemical_potential_equality
          - held_stage_certification
          - exact_hessian
      - case_label: "Matsuda 2011 perfluorohexane + hexane neutral LLE"
        evidence_tier: T1
        source: "data/reference/equilibrium_benchmarks/neutral_lle/matsuda_2011_pfhexane_hexane"
        retained_evidence: "analyses/package_validation/neutral_nonassociating_lle_showcase"
        source_model_family: "PC-SAFT-compatible sPC-SAFT"
        route: neutral_lle
        fixture_status: available
        scope: "Source-backed neutral nonassociating binary LLE showcase with paired NIST binodal branch rows and source-fitted binary interaction."
        acceptance_checks:
          - source_backed_binodal_branch_rows
          - source_backed_pure_parameters
          - source_fitted_binary_interaction
          - current_lle_route_acceptance
          - material_balance
          - pressure_consistency
          - chemical_potential_equality
          - held_stage_ii_replay
          - held_stage_iii_replay_consumption
          - exact_hessian
      - case_label: "Pereira 2012 System III"
        evidence_tier: T0
        source: "Pereira et al. 2012 neutral HELD benchmark"
        source_model_family: SAFT-VR
        current_fixture_blocker: model_family_mismatch
        fixture_status: source_data_needed
        todo: "Select a source-backed ePC-SAFT-compatible neutral TP flash fixture, or add SAFT-VR/model-parity support before using Pereira as validation input."
        acceptance_checks:
          - source_backed_parameters
          - material_balance
          - pressure_consistency
          - chemical_potential_equality
          - held_stage_certification
          - exact_hessian
    forbidden_shortcuts:
      - optimizer_success_only
      - deterministic_screening_as_full_held
      - public_utility_route_as_generalized_production

  - family_label: "PE-Associating TP Flash"
    family_kind: phase_equilibrium
    activation_status: planned_not_public
    production_exposed: false
    existing_public_utility_routes: []
    scope: "Neutral associating TP flash, VLE, and LLE after exact association derivative architecture exists."
    primary_problem: "Associating TP flash with PC-SAFT association mass-action consistency."
    knowns: [T, P, feed_composition]
    physical_variables: [phase_species_amounts, phase_volumes, association_state]
    objective_family: pressure_transformed_helmholtz_association
    hard_constraints: [material_balance, phase_pressure_consistency, chemical_potential_equality, association_mass_action]
    derivative_contract: exact_association_gradient_jacobian_hessian_required_before_exposure
    phase_discovery_status: planned_after_neutral_held_and_association_derivatives
    required_gates:
      - infrastructure_gate
      - exact_association_derivatives
      - association_mass_action_certification
      - neutral_phase_discovery_reuse
      - postsolve_phase_set_certification
    reference_cases:
      - case_label: "Gross/Sadowski 2002 methanol/cyclohexane"
        evidence_tier: T0
        source: "Gross and Sadowski 2002 associating PC-SAFT benchmark"
        fixture_status: source_data_needed
        acceptance_checks:
          - source_backed_parameters
          - association_mass_action
          - exact_hessian
          - phase_equilibrium_certification
      - case_label: "Water/1-pentanol associating follow-on"
        evidence_tier: T0
        source: "source-backed associating follow-on target to be selected"
        fixture_status: source_data_needed
        acceptance_checks:
          - two_associating_components
          - association_mass_action
          - exact_hessian
    forbidden_shortcuts:
      - explicit_approx_final_production
      - narrow_bubble_route_as_general_associating_validation

  - family_label: "PE-Electrolyte LLE/TP Flash"
    family_kind: phase_equilibrium
    activation_status: planned_not_public
    production_exposed: false
    existing_public_utility_routes: []
    scope: "Strong-electrolyte LLE and TP flash with charge-neutral reduced variables."
    primary_problem: "Electrolyte LLE/TP flash with electrochemical transfer equilibrium."
    knowns: [T, P, feed_composition]
    physical_variables: [reduced_charge_neutral_species_amounts, neutral_species_amounts, phase_volumes]
    objective_family: pressure_transformed_helmholtz_electrolyte
    hard_constraints: [material_balance, charge_balance, phase_pressure_consistency, electrochemical_potential_equality]
    derivative_contract: born_ssm_ds_exact_hessian_required_before_electrolyte_validation
    phase_discovery_status: held2_planned_after_born_exact_hessian
    required_gates:
      - infrastructure_gate
      - born_ssm_ds_exact_hessian
      - reduced_electroneutral_variable_basis
      - electrolyte_tpd
      - held2_stage_discovery
      - charge_and_electrochemical_certification
    reference_cases:
      - case_label: "Khudaida 2026 electrolyte LLE"
        evidence_tier: T1
        source: "data/reference/equilibrium_benchmarks/electrolyte_lle/khudaida_2026"
        fixture_status: available
        acceptance_checks:
          - source_backed_data
          - charge_balance
          - electrochemical_potential_equality
          - born_ssm_ds_exact_hessian
          - electrolyte_tpd_or_held2_certification
      - case_label: "Held 2014 Figure 6"
        evidence_tier: T0
        source: "Held et al. 2014 ePC-SAFT benchmark"
        fixture_status: source_data_needed
        acceptance_checks:
          - charge_balance
          - electrochemical_potential_equality
      - case_label: "Ascani/Sadowski/Held 2022 mixed-solvent LLE"
        evidence_tier: T0
        source: "Ascani, Sadowski, Held 2022 electrolyte LLE benchmark"
        fixture_status: source_data_needed
        acceptance_checks:
          - mixed_solvent_electrolyte_lle
          - electrochemical_potential_equality
    forbidden_shortcuts:
      - raw_ionic_chemical_potential_transfer
      - electrolyte_validation_before_born_ssm_ds_exact_hessian

  - family_label: "PE-Generalized Multiphase"
    family_kind: phase_equilibrium
    activation_status: planned_not_public
    production_exposed: false
    existing_public_utility_routes: []
    scope: "More-than-two-phase discovery and phase-set completeness across representative PE families."
    primary_problem: "Unknown phase count TP flash with source-backed phase-set certification."
    knowns: [T, P, feed_composition]
    physical_variables: [phase_count, phase_species_amounts, phase_volumes]
    objective_family: pressure_transformed_helmholtz
    hard_constraints: [material_balance, phase_pressure_consistency, transferable_potential_equality]
    derivative_contract: exact_gradient_jacobian_hessian_required_before_exposure
    phase_discovery_status: full_held_required
    internal_diagnostic_evidence:
      - evidence_label: "Neutral generalized phase-set diagnostic records"
        evidence_tier: T1
        command: "uv run --no-sync python scripts/validation/check_generalized_phase_set.py --json --require-complete"
        scope: "Internal neutral nonassociating three-candidate phase-set record contract only; no public generalized multiphase route exposure."
        result_requirement: "Three selected records, at least one rejected record, mass-balance feasible, noncollapsed selected compositions, phase_set_certified."
    required_gates:
      - infrastructure_gate
      - held_stage_i_stability
      - held_stage_ii_dual_phase_discovery
      - held_stage_iii_ipopt_refinement
      - mass_balance_candidate_selection
      - phase_set_completeness
    reference_cases:
      - case_label: "Representative neutral/associating/electrolyte replay"
        evidence_tier: T0
        source: "docs/superpowers/milestones/M4-equilibrium/generalized-fluid-phase-equilibrium.md"
        fixture_status: source_data_needed
        acceptance_checks:
          - all_eligible_phases_considered
          - candidate_phase_set_complete
          - no_phase_count_assumption
    forbidden_shortcuts:
      - selected_two_phase_only
      - per_phase_tpd_only

  - family_label: "CE Chemical Equilibrium Placeholder"
    family_kind: chemical_equilibrium
    activation_status: planned_not_public
    production_exposed: false
    existing_public_utility_routes: []
    scope: "Homogeneous chemical and speciation equilibrium after standard-state conventions are explicit."
    primary_problem: "Chemical equilibrium without phase split."
    knowns: [T, P, feed_composition, reaction_set]
    physical_variables: [species_amounts, reaction_extents_or_element_basis]
    objective_family: gibbs_or_helmholtz_chemical_equilibrium
    hard_constraints: [element_balance, reaction_affinity, standard_state_convention]
    derivative_contract: exact_derivatives_required_before_exposure
    phase_discovery_status: none
    required_gates:
      - reaction_constant_convention
      - standard_state_registry
      - reaction_affinity_certification
    reference_cases:
      - case_label: "Chemical equilibrium placeholder"
        evidence_tier: T0
        source: "docs/superpowers/milestones/M4-equilibrium/generalized-fluid-phase-equilibrium.md"
        fixture_status: source_data_needed
        acceptance_checks: [standard_state_convention, reaction_affinity]
    forbidden_shortcuts:
      - hidden_standard_state

  - family_label: "CPE Combined Phase-Chemical Placeholder"
    family_kind: combined_phase_chemical_equilibrium
    activation_status: planned_not_public
    production_exposed: false
    existing_public_utility_routes: []
    scope: "Simultaneous phase split and chemical/speciation equilibrium after PE and CE validation gates exist."
    primary_problem: "Combined phase and reaction equilibrium."
    knowns: [T, P, feed_composition, reaction_set]
    physical_variables: [phase_species_amounts, phase_volumes, reaction_variables]
    objective_family: pressure_transformed_helmholtz_with_reaction_affinity
    hard_constraints: [material_balance, phase_pressure_consistency, transferable_potential_equality, reaction_affinity]
    derivative_contract: exact_coupled_derivatives_required_before_exposure
    phase_discovery_status: planned_after_pe_and_ce_validation_gates
    required_gates:
      - pe_family_validation
      - ce_family_validation
      - coupled_phase_reaction_certification
    reference_cases:
      - case_label: "Combined phase-chemical placeholder"
        evidence_tier: T0
        source: "docs/superpowers/milestones/M4-equilibrium/generalized-fluid-phase-equilibrium.md"
        fixture_status: source_data_needed
        acceptance_checks: [phase_equilibrium, reaction_affinity, coupled_certification]
    forbidden_shortcuts:
      - phase_only_validation_as_cpe_validation
      - ce_only_validation_as_cpe_validation

derived_subworkflows:
  - label: "Bubble point"
    workflow_kind: derived_boundary
    planned_after_family: "PE-Neutral TP Flash"
    activation_family_row: false
    current_runtime_routes: [bubble_pressure, bubble_temperature]
    current_convergence_status: current_fixture_strict_route_points_verified
    fixed_variables: [temperature_or_pressure, liquid_or_feed_composition]
    free_variables: [incipient_vapor_composition, phase_volumes, boundary_pressure_or_temperature]
    diagram_targets: ["P-x", "T-x"]
    shared_mixture_policy: "Use the source-backed ePC-SAFT-compatible neutral TP flash mixture; Pereira 2012 System III remains HELD/SAFT-VR context only until model parity exists."
    diagnostic_policy: "Routine validation is contract-only. Current runtime route solves require one explicit route point unless an explicit sweep opt-in is provided."
    strict_convergence_gate: "Boundary workflow completion requires Ipopt success, solve_succeeded, and no max_iterations_exceeded seed attempt."
    vlle_test_required: false
    acceptance_checks: [dof_swap_contract, boundary_trace_contract, boundary_pressure_or_temperature, strict_ipopt_convergence, no_implicit_route_sweep, diagram_trace]

  - label: "Dew point"
    workflow_kind: derived_boundary
    planned_after_family: "PE-Neutral TP Flash"
    activation_family_row: false
    current_runtime_routes: [dew_pressure, dew_temperature]
    current_convergence_status: current_fixture_strict_route_points_verified
    fixed_variables: [temperature_or_pressure, vapor_composition]
    free_variables: [incipient_liquid_composition, phase_volumes, boundary_pressure_or_temperature]
    diagram_targets: ["P-x", "T-x"]
    shared_mixture_policy: "Use the source-backed ePC-SAFT-compatible neutral TP flash mixture; Pereira 2012 System III remains HELD/SAFT-VR context only until model parity exists."
    diagnostic_policy: "Routine validation is contract-only. Current runtime route solves require one explicit route point unless an explicit sweep opt-in is provided."
    strict_convergence_gate: "Boundary workflow completion requires Ipopt success, solve_succeeded, and no max_iterations_exceeded seed attempt."
    vlle_test_required: false
    acceptance_checks: [dof_swap_contract, boundary_trace_contract, boundary_pressure_or_temperature, strict_ipopt_convergence, no_implicit_route_sweep, diagram_trace]

  - label: "Cloud point"
    workflow_kind: derived_boundary
    planned_after_family: "PE-Neutral TP Flash"
    activation_family_row: false
    current_runtime_routes: []
    current_convergence_status: checker_gated_native_route_evidence_verified_public_routes_closed
    fixed_variables: [temperature_or_pressure, parent_liquid_composition]
    free_variables: [incipient_second_liquid_composition, phase_volumes, boundary_pressure_or_temperature]
    diagram_targets: ["P-x", "T-x"]
    shared_mixture_policy: "Use the source-backed ePC-SAFT-compatible neutral TP flash mixture; Pereira 2012 System III remains HELD/SAFT-VR context only until model parity exists."
    diagnostic_policy: "Routine validation is contract-only. Checker-gated native route evidence uses one model-refined Matsuda neutral_lle source branch; public runtime route keys remain closed. Any multi-point route sweep still requires explicit sweep opt-in."
    strict_convergence_gate: "Boundary workflow completion requires Ipopt success, solve_succeeded, and no max_iterations_exceeded seed attempt."
    vlle_test_required: false
    acceptance_checks: [dof_swap_contract, source_backed_cloud_binodal_rows, source_backed_cloud_shadow_pair, model_refined_source_branch_reference, checker_gated_native_cloud_temperature_route, public_route_admission_closed, cloud_shadow_pair_consistency, strict_ipopt_convergence, no_implicit_route_sweep, diagram_trace]

  - label: "Shadow point"
    workflow_kind: derived_boundary
    planned_after_family: "PE-Neutral TP Flash"
    activation_family_row: false
    current_runtime_routes: []
    current_convergence_status: checker_gated_native_route_evidence_verified_public_routes_closed
    fixed_variables: [cloud_point_state]
    free_variables: [shadow_phase_composition, shadow_phase_volume]
    diagram_targets: ["P-x", "T-x"]
    shared_mixture_policy: "Use the source-backed ePC-SAFT-compatible neutral TP flash mixture; Pereira 2012 System III remains HELD/SAFT-VR context only until model parity exists."
    diagnostic_policy: "Routine validation is contract-only. Checker-gated native route evidence uses one model-refined Matsuda neutral_lle source branch; public runtime route keys remain closed. Any multi-point route sweep still requires explicit sweep opt-in."
    strict_convergence_gate: "Boundary workflow completion requires Ipopt success, solve_succeeded, and no max_iterations_exceeded seed attempt."
    vlle_test_required: false
    acceptance_checks: [dof_swap_contract, source_backed_cloud_binodal_rows, source_backed_cloud_shadow_pair, model_refined_source_branch_reference, checker_gated_native_cloud_temperature_route, public_route_admission_closed, cloud_shadow_pair_consistency, strict_ipopt_convergence, no_implicit_route_sweep, diagram_trace]

neutral_tp_flash_fixture_gate:
  target_family_label: "PE-Neutral TP Flash"
  fixture_status: executable_fixture_available
  accepted_source_model_families: ["PC-SAFT", "ePC-SAFT"]
  rejected_context_cases:
    "Pereira 2012 System III":
      source_model_family: SAFT-VR
      blocker: model_family_mismatch
      reason: "Pereira 2012 System III is useful HELD context, but the local source audit shows SAFT-VR range and binary interaction parameters rather than an executable ePC-SAFT/PC-SAFT fixture."
  executable_fixture_required_fields:
    - species
    - pure_component_parameters
    - binary_interactions
    - temperature
    - pressure
    - feed_composition
    - expected_phase_count
    - expected_phase_compositions
    - expected_phase_fractions
    - source_model_family
    - source_path
    - acceptance_tolerances
  phase_discovery_required:
    - deterministic_screening
    - continuous_tpd_minimization
    - held_stage_i_stability
    - held_stage_ii_dual_phase_discovery
    - held_stage_iii_ipopt_refinement
  local_source_audit:
    - case_label: "Gross/Sadowski 2001 binary VLE table"
      local_artifact: "analyses/paper_validation/2001_gross/tables/table_005/table_005.csv"
      source_model_family: PC-SAFT
      status: insufficient_no_point_phase_split_fixture
      note: "This table supplies binary VLE correlation/AAD context and fitted k_ij values, but not a single T, P, feed-composition, phase-fraction, and phase-composition TP-flash target."
    - case_label: "Hydrocarbon workbook TP flash smoke"
      local_artifact: "data/reference/equilibrium_benchmarks/neutral_tp_flash/hydrocarbon_workbook_flash/metadata.json"
      source_model_family: PC-SAFT
      status: promoted_executable_workbook_fixture
      note: "The workbook bubble-point coexistence state now has a derived equal-phase TP flash feed, explicit phase fractions, source-backed PC-SAFT parameters, and an executable neutral TP flash fixture gate."
    - case_label: "Pereira 2012 System III"
      local_artifact: "data/reference/equilibrium_benchmarks/neutral_tp_flash/pereira_2012/metadata.json"
      source_audit_path: "data/reference/equilibrium_benchmarks/neutral_tp_flash/pereira_2012"
      source_model_family: SAFT-VR
      status: rejected_model_family_mismatch
      note: "Do not use as executable ePC-SAFT validation input unless SAFT-VR/model parity support or a source-backed ePC-SAFT reparameterization is added."

