schema_version: 2
source_document: "docs/superpowers/milestones/M4-equilibrium/generalized-fluid-phase-equilibrium.md"

policy:
  label_policy: "family_label values are planning labels only, not runtime keys or public route strings."
  generalized_status_policy: "Generalized family rows stay planned_not_public until full HELD-stage phase discovery, exact derivatives, postsolve certification, and public admission are proven for the named scope."
  current_public_route_policy: "Existing public utility routes remain implemented and tested. Source-backed public admission rows are narrow production exposures only for their retained fixture scope."
  deterministic_screening_policy: "Current deterministic TPD/candidate screening is seed and certification support, not full HELD."
  domain_safety_policy: "All generalized routes require route-owned bounds, a smooth VariableTransform wrapper, and Ipopt internal barrier handling of explicit bounds and constraints."
  custom_barrier_policy: "Production thermodynamic objectives must not include permanent custom barrier terms."
  documentation_scope: "canonical_doctrine_registry_schema_tests_only"

excluded_current_runtime_route_keys:
  - bubble_dew_derived_routes
  - bubble_pressure
  - bubble_temperature
  - dew_pressure
  - dew_temperature

activation_status_vocabulary:
  planned_not_public: "Planning family with no generalized production exposure."
  implemented_utility_not_generalized: "Existing public utility behavior may exist, but does not satisfy generalized admission gates."
  source_backed_associating_lle_public_admitted: "Source-backed associating LLE public admission for the retained methanol/cyclohexane fixture only."
  source_backed_electrolyte_lle_public_admitted: "Source-backed electrolyte LLE public admission for the retained explicit-ion Khudaida fixture only."
  diagnostic_only: "Internal helper or diagnostic layer only."
  source_data_needed: "A source-backed target exists but local executable fixture data are missing."

evidence_tiers:
  T0:
    name: documented_design_or_inventory
    production_eligible: false
  T1:
    name: executable_package_fixture
    production_eligible: false
  T2:
    name: source_digitized_reference
    production_eligible: false
  T3:
    name: reproduced_literature_curve_or_table
    production_eligible: false

generalized_production_gates:
  - infrastructure_gate
  - continuous_tpd_minimization
  - held_stage_i_stability
  - held_stage_ii_dual_phase_discovery
  - held_stage_iii_ipopt_refinement
  - exact_gradient_jacobian_hessian
  - route_domain_bounds
  - variable_transform_chain_rule
  - ipopt_barrier_bounds_constraints
  - postsolve_phase_set_certification

family_rows:
  - family_label: "PE-Neutral TP Flash"
    family_kind: phase_equilibrium
    activation_status: planned_not_public
    production_exposed: false
    existing_public_utility_routes: [flash, lle]
    scope: "Neutral, nonelectrolyte, nonreactive TP flash plus neutral VLE/LLE validation ladder."
    primary_problem: "TP flash at fixed T, P, and feed composition."
    knowns: [T, P, feed_composition]
    physical_variables: [phase_species_amounts, phase_volumes]
    objective_family: pressure_transformed_helmholtz
    hard_constraints: [material_balance, phase_pressure_consistency, chemical_potential_equality]
    derivative_contract: exact_gradient_jacobian_hessian_required_before_generalized_exposure
    phase_discovery_status: continuous_tpd_stage_i_stage_ii_dual_loop_replay_verified_current_fixture
    phase_discovery_gate_status:
      deterministic_screening: implemented_seed_and_certification_support_not_full_held
      continuous_tpd_minimization: implemented_neutral_coordinate_search_convergence_required
      held_stage_i_stability: implemented_neutral_multi_start_convergence_required
      held_stage_ii_candidate_bound_audit: current_neutral_candidate_bound_audit_closed
      held_stage_ii_dual_phase_discovery: current_neutral_dual_loop_replay_verified_current_fixture
      held_stage_iii_ipopt_refinement: current_route_refinement_consumes_stage_ii_replay_with_ipopt_success
    required_gates:
      - infrastructure_gate
      - continuous_tpd_minimization
      - held_stage_i_stability
      - held_stage_ii_dual_phase_discovery
      - held_stage_iii_ipopt_refinement
      - postsolve_phase_set_certification
    reference_cases:
      - case_label: "Hydrocarbon workbook derived TP flash"
        evidence_tier: T1
        source: "data/reference/equilibrium_benchmarks/neutral_tp_flash/methane_ethane_propane"
        source_model_family: PC-SAFT
        fixture_status: available
        acceptance_checks:
          - source_backed_parameters
          - material_balance
          - pressure_consistency
          - chemical_potential_equality
          - held_stage_certification
          - exact_hessian
      - case_label: "Matsuda 2011 perfluorohexane + hexane neutral LLE"
        evidence_tier: T1
        source: "data/reference/equilibrium_benchmarks/neutral_lle/perfluorohexane_hexane"
        retained_evidence: "analyses/package_validation/neutral_nonassociating_lle_showcase"
        source_model_family: "PC-SAFT-compatible sPC-SAFT"
        route: neutral_lle
        fixture_status: available
        scope: "Source-backed neutral nonassociating binary LLE showcase with paired NIST binodal branch rows and source-fitted binary interaction."
        acceptance_checks:
          - source_backed_binodal_branch_rows
          - source_backed_pure_parameters
          - source_fitted_binary_interaction
          - current_lle_route_acceptance
          - material_balance
          - pressure_consistency
          - chemical_potential_equality
          - held_stage_ii_replay
          - held_stage_iii_replay_consumption
          - exact_hessian
      - case_label: "Pereira 2012 System III"
        evidence_tier: T0
        source: "Pereira et al. 2012 neutral HELD benchmark"
        source_model_family: SAFT-VR
        current_fixture_blocker: model_family_mismatch
        fixture_status: source_data_needed
        todo: "Select a source-backed ePC-SAFT-compatible neutral TP flash fixture, or add SAFT-VR/model-parity support before using Pereira as validation input."
        acceptance_checks:
          - source_backed_parameters
          - material_balance
          - pressure_consistency
          - chemical_potential_equality
          - held_stage_certification
          - exact_hessian
    forbidden_shortcuts:
      - optimizer_success_only
      - deterministic_screening_as_full_held
      - public_utility_route_as_generalized_production

  - family_label: "PE-Associating TP Flash"
    family_kind: phase_equilibrium
    activation_status: source_backed_associating_lle_public_admitted
    production_exposed: true
    existing_public_utility_routes: [lle]
    scope: "Neutral associating TP flash, VLE, and LLE; public exposure is currently limited to the retained methanol/cyclohexane LLE fixture."
    primary_problem: "Associating TP flash with PC-SAFT association mass-action consistency."
    knowns: [T, P, feed_composition]
    physical_variables: [phase_species_amounts, phase_volumes, association_state]
    objective_family: pressure_transformed_helmholtz_association
    hard_constraints: [material_balance, phase_pressure_consistency, chemical_potential_equality, association_mass_action]
    derivative_contract: exact_association_gradient_jacobian_hessian_required_before_exposure
    phase_discovery_status: planned_after_neutral_held_and_association_derivatives
    required_gates:
      - infrastructure_gate
      - exact_association_derivatives
      - association_mass_action_certification
      - neutral_phase_discovery_reuse
      - postsolve_phase_set_certification
    admission_evidence:
      - evidence_label: "Gross/Sadowski 2002 methanol/cyclohexane internal exact-Hessian gate"
        evidence_tier: T2
        command: "uv run python scripts/validation/check_associating_lle_gross_2002.py --json --require-source-data --require-exact-association-hessian --require-route-closed --require-complete"
        scope: "Source-backed one-associating-component neutral LLE fixture for issue #145 using Gross/Sadowski 2002 Figure 8, Table 1, Table 2, retained parameters, exact association Hessian diagnostics, internal source-pair certification, and closed public associating route admission."
        result_requirement: "Figure 8 LLE rows retained; methanol 2B association and cyclohexane neutral parameters retained; k_ij = 0.051 retained; exact association site first/second sensitivities and objective/pressure/mass-action/Lagrangian Hessians verified; public associating LLE admission remains closed until issue #190."
      - evidence_label: "Associating public GFPE admission gate"
        evidence_tier: T2
        command: "uv run python scripts/validation/check_associating_gfpe_gate.py --json --require-source-data --require-public-admission --require-exact-association-hessian --require-complete"
        scope: "Public source-backed associating LLE admission evidence for `Equilibrium(..., route='lle')` using the retained methanol/cyclohexane Figure 8 fixture."
        result_requirement: "Checker returns complete with no blockers; public route is `lle`; selector route is `neutral_lle`; exact association Hessian evidence is retained; reactive, TP-flash, and generalized associating phase-set surfaces remain outside this admission."
    reference_cases:
      - case_label: "Gross/Sadowski 2002 methanol/cyclohexane"
        evidence_tier: T2
        source: "data/reference/equilibrium_benchmarks/associating_lle/methanol_cyclohexane"
        source_model_family: PC-SAFT
        route: associating_lle_internal_proof
        fixture_status: available
        proof_status: internal_exact_hessian_source_pair_certified
        scope: "Source-backed methanol/cyclohexane Figure 8 liquid-liquid branch fixture for one-associating-component public proof."
        acceptance_checks:
          - source_digitized_figure_8_lle_rows
          - source_backed_parameters
          - source_backed_binary_interaction
          - public_associating_route_admitted
          - association_mass_action
          - exact_hessian
          - phase_equilibrium_certification
      - case_label: "Water/1-pentanol associating follow-on"
        evidence_tier: T0
        source: "source-backed associating follow-on target to be selected"
        fixture_status: source_data_needed
        acceptance_checks:
          - two_associating_components
          - association_mass_action
          - exact_hessian
    forbidden_shortcuts:
      - explicit_approx_final_production
      - narrow_bubble_route_as_general_associating_validation

  - family_label: "PE-Electrolyte LLE/TP Flash"
    family_kind: phase_equilibrium
    activation_status: source_backed_electrolyte_lle_public_admitted
    production_exposed: true
    existing_public_utility_routes: [electrolyte_lle]
    scope: "Strong-electrolyte LLE and TP flash with charge-neutral reduced variables."
    primary_problem: "Electrolyte LLE/TP flash with electrochemical transfer equilibrium."
    knowns: [T, P, feed_composition]
    physical_variables: [reduced_charge_neutral_species_amounts, neutral_species_amounts, phase_volumes]
    objective_family: pressure_transformed_helmholtz_electrolyte
    hard_constraints: [material_balance, charge_balance, phase_pressure_consistency, electrochemical_potential_equality]
    derivative_contract: born_ssm_ds_exact_hessian_required_before_electrolyte_validation
    phase_discovery_status: held2_postsolve_certified_public_admission_complete
    phase_discovery_contract:
      completed_issue: 306
      scope: "HELD2 counterion-pair phase discovery plus Stage III refinement, postsolve certification, and public route admission are retained as separate evidence gates."
      required_payload_groups:
        - prerequisite_gate_receipts_269_300_302
        - charged_species_ordering_and_charges
        - counterion_pair_matrix_rank_nch_minus_one
        - reduced_coordinate_lift_back_lift_residuals
        - finite_reduced_tpd_candidate_metrics
        - pair_based_mean_ionic_residual_bookkeeping
        - stage_iii_reduced_variable_refinement
        - postsolve_explicit_ion_phase_set_certification
        - stage_statuses_with_public_admission
      required_matrix_tests:
        - nacl_single_salt_rank_one
        - na_k_cl_common_anion_rank_two
        - k_cl_na_so4_multivalent_rank_three
      required_negative_tests:
        - reject_hardcoded_nacl_only_evidence
        - reject_missing_multi_ion_source_fixture
        - reject_raw_single_ion_transfer_acceptance
        - reject_incomplete_prerequisite_gates
        - reject_premature_stage_iii_postsolve_or_public_admission_completion
    required_gates:
      - infrastructure_gate
      - born_ssm_ds_exact_hessian
      - reduced_electroneutral_variable_basis
      - electrolyte_tpd
      - held2_counterion_pair_phase_discovery
      - held2_stage_iii_reduced_variable_refinement
      - electrolyte_postsolve_phase_set_certification
      - held2_stage_discovery
      - charge_and_electrochemical_certification
      - electrolyte_gfpe_closed_admission_source_gate
      - electrolyte_public_route_admission
    admission_evidence:
      - evidence_label: "Khudaida electrolyte GFPE closed-admission gate"
        evidence_tier: T1
        command: "uv run --no-sync python scripts/validation/check_electrolyte_gfpe_gate.py --json --require-source-data --require-parameter-bundle --require-native-diagnostics --require-complete"
        scope: "Pre-association electrolyte GFPE source-data, raw closure-drift accounting, normalized explicit-ion expansion, and native electrolyte/charge diagnostics for the Khudaida 2026 source fixture."
        result_requirement: "Khudaida source fixture parsed; raw paper-row closure correction recorded; explicit-ion charge balance <= 1.0e-8; path-based `2026_Khudaida` parameter bundle constructs native mixture; native electrolyte contribution active; native phase-charge diagnostic residual <= 1.0e-8."
      - evidence_label: "Electrolyte HELD2 readiness and Born SSM/DS exactness gate"
        evidence_tier: T1
        command: "uv run --no-sync python scripts/validation/check_electrolyte_held2_readiness.py --json --require-source-gate --require-reduced-basis --require-born-ssm-ds --require-complete"
        scope: "Prerequisite-only electrolyte HELD2 readiness evidence for the Khudaida 2026 source fixture: consumes the source gate, verifies the exact NaCl charge-neutral reduced amount lift, and records CppAD Born SSM/DS derivative receipts."
        result_requirement: "Khudaida source gate complete; reduced NaCl amount lift charge residual <= 1.0e-10; CppAD Born SSM/DS composition, ln-fugacity, activity-parameter, `d_born`, and `f_solv` derivative receipts finite; HELD2 status marked readiness-only. Electrolyte TPD screening is covered by the #302 evidence row."
      - evidence_label: "Charge-neutral electrolyte TPD screening gate"
        evidence_tier: T1
        command: "uv run --no-sync python scripts/validation/check_electrolyte_tpd_gate.py --json --require-source-gate --require-held2-readiness --require-native-tpd --require-complete"
        scope: "Prerequisite-only electrolyte TPD screening evidence for the Khudaida 2026 source fixture: consumes the source gate and readiness gate, and calls native `_native_electrolyte_tpd_phase_discovery`."
        result_requirement: "Three finite source-backed candidates; selected candidate count 2; minimum TPD -0.010922388988229025; maximum charge residual 0.0; HELD2 status marked readiness-only."
      - evidence_label: "Electrolyte HELD2 counterion-pair phase-discovery gate"
        evidence_tier: T1
        command: "uv run --no-sync python scripts/validation/check_electrolyte_held2_phase_discovery.py --json --require-source-gate --require-readiness-gate --require-tpd-gate --require-native-held2-discovery --require-complete"
        scope: "Phase-discovery-only electrolyte HELD2 evidence: consumes #269/#300/#302 gates, calls native `_native_electrolyte_held2_phase_discovery`, reports independent counterion-pair matrix diagnostics, source-backed multi-ion preprocessor fixtures, charge-neutral lifted candidate rows, and pair-based mean-ionic bookkeeping."
        result_requirement: "Counterion-pair matrix rank equals N_ch - 1; Na+/Cl-, Na+/K+/Cl-, and K+/Cl-/Na+/SO4-- source/methodology cases are covered; selected candidate count is positive; minimum TPD and pair residual metrics are finite."
      - evidence_label: "Electrolyte HELD2 Stage III reduced-variable refinement gate"
        evidence_tier: T1
        command: "uv run --no-sync python scripts/validation/check_electrolyte_stage_iii_refinement.py --json --require-source-gate --require-readiness-gate --require-tpd-gate --require-held2-discovery --require-native-stage-iii --require-complete"
        scope: "Stage III electrolyte refinement evidence: consumes #269/#300/#302/#306, calls native `_native_electrolyte_stage_iii_refinement`, records the #306 candidate-set seed provenance, reduced counterion-pair residual variables/equations/scaling/bounds, exact reduced Jacobian/Hessian receipts, strict Ipopt solve diagnostics, and finite phase compositions."
        result_requirement: "Checker returns complete with no blockers; Ipopt status `Solve_Succeeded`; reduced residual infinity norm <= 1.0e-4; charge/material/pressure diagnostics finite; exact reduced residual Jacobian/Hessian receipts retained."
      - evidence_label: "Electrolyte postsolve phase-set certification gate"
        evidence_tier: T1
        command: "uv run --no-sync python scripts/validation/check_electrolyte_postsolve_certification.py --json --require-stage-iii --require-postsolve-certification --require-complete"
        scope: "Postsolve electrolyte phase-set certification evidence: consumes #312, calls native `_native_electrolyte_postsolve_certification`, and retains explicit-ion reconstruction, per-phase and total charge residuals, neutral and mean-ionic transfer residuals, pressure consistency, phase amount, composition normalization, and domain-margin diagnostics."
        result_requirement: "Checker returns complete with no blockers; explicit-ion feed reconstruction <= 1.0e-4; phase and total charge residuals <= 1.0e-8; neutral and mean-ionic transfer residuals <= 1.0e-4; pressure consistency <= 1.0e-4; phase distance exceeds 1.0e-8."
      - evidence_label: "Electrolyte public route admission gate"
        evidence_tier: T1
        command: "uv run --no-sync python scripts/validation/check_electrolyte_public_admission.py --json --require-source-gate --require-readiness-gate --require-tpd-gate --require-held2-discovery --require-stage-iii --require-postsolve-certification --require-public-admission --require-complete"
        scope: "Public source-backed electrolyte LLE admission evidence: consumes #269/#300/#302/#306/#312/#313, calls `Equilibrium(..., route='electrolyte_lle')`, and exposes only the certified Khudaida 2026 H2O/Ethanol/Butanol/Na+/Cl- pre-association electrolyte LLE scope."
        result_requirement: "Checker returns complete with no blockers; public route `electrolyte_lle` maps to selector family `electrolyte_lle`; phase labels are `liquid1` and `liquid2`; phase and total charge residuals are <= 1.0e-8; pressure consistency <= 1.0e-4; exact reduced Jacobian/Hessian receipts are retained; reactive, CE, CPE, regression, and release claims remain closed."
    reference_cases:
      - case_label: "Khudaida 2026 electrolyte LLE"
        evidence_tier: T1
        source: "data/reference/equilibrium_benchmarks/electrolyte_lle/water_ethanol_isobutanol_nacl"
        fixture_status: available
        acceptance_checks:
          - source_backed_data
          - charge_balance
          - electrochemical_potential_equality
          - born_ssm_ds_exact_hessian
          - electrolyte_tpd_or_held2_certification
          - electrolyte_postsolve_phase_set_certification
          - electrolyte_public_route_admission
      - case_label: "Held 2014 Figure 6"
        evidence_tier: T0
        source: "Held et al. 2014 ePC-SAFT benchmark"
        fixture_status: source_data_needed
        acceptance_checks:
          - charge_balance
          - electrochemical_potential_equality
      - case_label: "Ascani/Sadowski/Held 2022 mixed-solvent LLE"
        evidence_tier: T0
        source: "Ascani, Sadowski, Held 2022 electrolyte LLE benchmark"
        fixture_status: source_data_needed
        acceptance_checks:
          - mixed_solvent_electrolyte_lle
          - electrochemical_potential_equality
    forbidden_shortcuts:
      - raw_ionic_chemical_potential_transfer
      - electrolyte_validation_before_born_ssm_ds_exact_hessian

  - family_label: "PE-Generalized Multiphase"
    family_kind: phase_equilibrium
    activation_status: neutral_public_admitted
    production_exposed: true
    existing_public_utility_routes: [multiphase]
    scope: "More-than-two-phase discovery and phase-set completeness; neutral nonassociating public admission is active while associating, electrolyte, and reactive families remain separate gates."
    primary_problem: "Unknown phase count TP flash with source-backed phase-set certification."
    knowns: [T, P, feed_composition]
    physical_variables: [phase_count, phase_species_amounts, phase_volumes]
    objective_family: pressure_transformed_helmholtz
    hard_constraints: [material_balance, phase_pressure_consistency, transferable_potential_equality]
    derivative_contract: exact_gradient_jacobian_hessian_required_before_exposure
    phase_discovery_status: neutral_stage_ii_stage_iii_replay_verified_public_admission
    admission_evidence:
      - evidence_label: "Neutral generalized phase-set diagnostic records"
        evidence_tier: T1
        command: "uv run --no-sync python scripts/validation/check_generalized_phase_set.py --json --require-complete"
        scope: "Neutral nonassociating three-candidate phase-set record contract retained as historical internal certification evidence."
        result_requirement: "Three selected records, at least one rejected record, mass-balance feasible, noncollapsed selected compositions, phase_set_certified."
      - evidence_label: "Strict neutral multiphase fugacity-residual refinement"
        evidence_tier: T1
        command: "uv run --no-sync python scripts/validation/check_generalized_phase_set.py --json --phase-kinds liquid,liquid,liquid --run-route-refinement --require-route-refinement --require-complete"
        scope: "Neutral nonassociating Stage II candidate-set replay refined by the strict fugacity-residual route."
        result_requirement: "strict_multiphase_fugacity_residual_route, exact_reduced_fugacity_residual_derivatives, stage_ii_candidate_set_replay_consumed, accepted postsolve, ln_fugacity_consistency_norm <= 1.0e-6."
      - evidence_label: "Public neutral multiphase admission checker"
        evidence_tier: T1
        command: "uv run --no-sync python scripts/validation/check_generalized_phase_set.py --json --phase-kinds liquid,liquid,liquid --run-route-refinement --require-route-refinement --require-public-admission --require-complete"
        scope: "Public neutral nonassociating `Equilibrium(..., route=\"multiphase\", phase_kinds=[...]).solve()` admission backed by the strict residual route."
        result_requirement: "public_multiphase_route, neutral_multiphase_nonassoc selector family, exact Hessian evidence, accepted postsolve, ln_fugacity_consistency_norm <= 1.0e-6, generalized_phase_set_public_admission_checker."
    required_gates:
      - infrastructure_gate
      - held_stage_i_stability
      - held_stage_ii_dual_phase_discovery
      - held_stage_iii_ipopt_refinement
      - mass_balance_candidate_selection
      - phase_set_completeness
      - strict_multiphase_fugacity_residual_route
      - exact_reduced_fugacity_residual_derivatives
      - stage_ii_candidate_set_replay_consumed
      - public_multiphase_route
      - generalized_phase_set_public_admission_checker
    reference_cases:
      - case_label: "Representative neutral/associating/electrolyte replay"
        evidence_tier: T0
        source: "docs/superpowers/milestones/M4-equilibrium/generalized-fluid-phase-equilibrium.md"
        fixture_status: source_data_needed
        acceptance_checks:
          - all_eligible_phases_considered
          - candidate_phase_set_complete
          - no_phase_count_assumption
    forbidden_shortcuts:
      - selected_two_phase_only
      - per_phase_tpd_only

