      - evidence_label: "Gross/Sadowski 2002 methanol/cyclohexane internal exact-Hessian gate"
        evidence_tier: T2
        command: "uv run python scripts/validation/check_associating_lle_gross_2002.py --json --require-source-data --require-exact-association-hessian --require-route-closed --require-complete"
        scope: "Source-backed one-associating-component neutral LLE fixture for issue #145 using Gross/Sadowski 2002 Figure 8, Table 1, Table 2, retained parameters, exact association Hessian diagnostics, internal source-pair certification, and closed public associating route admission."
        result_requirement: "Figure 8 LLE rows retained; methanol 2B association and cyclohexane neutral parameters retained; k_ij = 0.051 retained; exact association site first/second sensitivities and objective/pressure/mass-action/Lagrangian Hessians verified; public LLE admission remains closed until a separate global HELD proof and re-admission change."
      - evidence_label: "Gross association internal evidence gate"
        evidence_tier: T2
        command: "uv run --no-sync python scripts/validation/check_gross_2002_association_acceptance.py --json --require-complete --require-exact-association-hessian --require-fresh-native"
        scope: "Source-backed internal associating LLE component evidence for the retained methanol/cyclohexane Figure 8 fixture and Figure 10 cross-association stress case."
        result_requirement: "Checker returns complete with no blockers; exact association Hessian and fresh-native identity evidence are retained; public `lle`, reactive, TP-flash, and generalized associating phase-set surfaces remain closed."
    reference_cases:
