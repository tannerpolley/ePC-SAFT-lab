  - family_label: "PE-Electrolyte LLE/TP Flash"
    family_kind: phase_equilibrium
    activation_status: active_validation_not_public
    production_exposed: false
    existing_public_utility_routes: []
    scope: "Internal strong-electrolyte LLE diagnostics with charge-neutral reduced variables; selector integration and source reproduction remain incomplete."
    primary_problem: "Electrolyte LLE/TP flash with electrochemical transfer equilibrium."
    knowns: [T, P, feed_composition]
    physical_variables: [reduced_charge_neutral_species_amounts, neutral_species_amounts, phase_volumes]
    objective_family: pressure_transformed_helmholtz_electrolyte
    hard_constraints: [material_balance, charge_balance, phase_pressure_consistency, electrochemical_potential_equality]
    derivative_contract: born_ssm_ds_exact_hessian_required_before_electrolyte_validation
    phase_discovery_status: retained_component_diagnostics_selector_integration_and_perdomo_figiel_validation_pending
    phase_discovery_contract:
      completed_issue: 350
      scope: "Retained HELD2 component diagnostics through #344-#350 are internal repair evidence; they do not prove native-selector ownership or source reproduction."
      required_payload_groups:
        - prerequisite_gate_receipts_269_300_302
        - charged_species_ordering_and_charges
        - counterion_pair_matrix_rank_nch_minus_one
        - reduced_coordinate_lift_back_lift_residuals
        - finite_reduced_tpd_candidate_metrics
        - pair_based_mean_ionic_residual_bookkeeping
        - stage_i_stability_certificate
        - stage_ii_dual_loop_bound_history_and_replay
        - stage_iii_reduced_variable_refinement
        - postsolve_explicit_ion_phase_set_certification
        - shared_phase_equilibrium_certification
      required_matrix_tests:
        - nacl_single_salt_rank_one
        - na_k_cl_common_anion_rank_two
        - k_cl_na_so4_multivalent_rank_three
      required_negative_tests:
        - reject_hardcoded_nacl_only_evidence
        - reject_missing_multi_ion_source_fixture
        - reject_raw_single_ion_transfer_acceptance
        - reject_incomplete_prerequisite_gates
        - reject_premature_stage_iii_or_postsolve_completion
    required_gates:
      - infrastructure_gate
      - born_ssm_ds_exact_hessian
      - reduced_electroneutral_variable_basis
      - electrolyte_tpd
      - held2_counterion_pair_phase_discovery
      - held2_stage_i_stability_certificate
      - held2_stage_ii_dual_phase_discovery
      - held2_stage_iii_reduced_variable_refinement
      - electrolyte_postsolve_phase_set_certification
      - held2_stage_discovery
      - charge_and_electrochemical_certification
      - electrolyte_gfpe_closed_admission_source_gate
    diagnostic_evidence:
      - evidence_label: "Khudaida electrolyte GFPE closed-admission gate"
        evidence_tier: T1
        command: "uv run --no-sync python scripts/validation/check_electrolyte_gfpe_gate.py --json --require-source-data --require-parameter-bundle --require-native-diagnostics --require-complete"
        scope: "Pre-association electrolyte GFPE source-data, raw closure-drift accounting, normalized explicit-ion expansion, and native electrolyte/charge diagnostics for the Khudaida 2026 source fixture."
        result_requirement: "Khudaida source fixture parsed; raw paper-row closure correction recorded; explicit-ion charge balance <= 1.0e-8; path-based `2026_Khudaida` parameter bundle constructs native mixture; native electrolyte contribution active; native phase-charge diagnostic residual <= 1.0e-8."
      - evidence_label: "Electrolyte HELD2 readiness and Born SSM/DS exactness gate"
        evidence_tier: T1
        command: "uv run --no-sync python scripts/validation/check_electrolyte_held2_readiness.py --json --require-source-gate --require-reduced-basis --require-born-ssm-ds --require-complete"
        scope: "Prerequisite-only electrolyte HELD2 readiness evidence for the Khudaida 2026 source fixture: consumes the source gate, verifies the exact NaCl charge-neutral reduced amount lift, and records CppAD Born SSM/DS derivative receipts."
        result_requirement: "Khudaida source gate complete; reduced NaCl amount lift charge residual <= 1.0e-10; CppAD Born SSM/DS composition, ln-fugacity, activity-parameter, `d_born`, and `f_solv` derivative receipts finite; HELD2 status marked readiness-only. Electrolyte TPD screening is covered by the #302 evidence row."
      - evidence_label: "Charge-neutral electrolyte TPD screening gate"
        evidence_tier: T1
        command: "uv run --no-sync python scripts/validation/check_electrolyte_tpd_gate.py --json --require-source-gate --require-held2-readiness --require-native-tpd --require-complete"
        scope: "Prerequisite-only electrolyte TPD screening evidence for the Khudaida 2026 source fixture: consumes the source gate and readiness gate, and calls native `_native_electrolyte_tpd_phase_discovery`."
        result_requirement: "Three finite source-backed candidates; selected candidate count 2; minimum TPD -0.010922388988229025; maximum charge residual 0.0; HELD2 status marked readiness-only."
      - evidence_label: "Electrolyte HELD2 counterion-pair phase-discovery gate"
        evidence_tier: T1
        command: "uv run --no-sync python scripts/validation/check_electrolyte_held2_phase_discovery.py --json --require-source-gate --require-readiness-gate --require-tpd-gate --require-native-held2-discovery --require-complete"
        scope: "Phase-discovery-only electrolyte HELD2 evidence: consumes #269/#300/#302 gates, calls native `_native_electrolyte_held2_phase_discovery`, reports independent counterion-pair matrix diagnostics, source-backed multi-ion preprocessor fixtures, charge-neutral lifted candidate rows, and pair-based mean-ionic bookkeeping."
        result_requirement: "Counterion-pair matrix rank equals N_ch - 1; Na+/Cl-, Na+/K+/Cl-, and K+/Cl-/Na+/SO4-- source/methodology cases are covered; selected candidate count is positive; minimum TPD and pair residual metrics are finite."
      - evidence_label: "Electrolyte HELD2 Stage III reduced-variable refinement gate"
        evidence_tier: T1
        command: "uv run --no-sync python scripts/validation/check_electrolyte_stage_iii_refinement.py --json --require-source-gate --require-readiness-gate --require-tpd-gate --require-held2-discovery --require-native-stage-iii --require-complete"
        scope: "Stage III electrolyte refinement evidence: consumes #269/#300/#302/#306, calls native `_native_electrolyte_stage_iii_refinement`, records the #306 candidate-set seed provenance, reduced counterion-pair residual variables/equations/scaling/bounds, exact reduced Jacobian/Hessian receipts, strict Ipopt solve diagnostics, and finite phase compositions."
        result_requirement: "Checker returns complete with no blockers; Ipopt status `Solve_Succeeded`; reduced residual infinity norm <= 1.0e-4; charge/material/pressure diagnostics finite; exact reduced residual Jacobian/Hessian receipts retained."
      - evidence_label: "Electrolyte postsolve phase-set certification gate"
        evidence_tier: T1
        command: "uv run --no-sync python scripts/validation/check_electrolyte_postsolve_certification.py --json --require-stage-iii --require-postsolve-certification --require-complete"
        scope: "Postsolve electrolyte phase-set certification evidence: consumes #312, calls native `_native_electrolyte_postsolve_certification`, and retains explicit-ion reconstruction, per-phase and total charge residuals, neutral and mean-ionic transfer residuals, pressure consistency, phase amount, composition normalization, and domain-margin diagnostics."
        result_requirement: "Checker returns complete with no blockers; explicit-ion feed reconstruction <= 1.0e-4; phase and total charge residuals <= 1.0e-8; neutral and mean-ionic transfer residuals <= 1.0e-4; pressure consistency <= 1.0e-4; phase distance exceeds 1.0e-8."
    reference_cases:
      - case_label: "Khudaida 2026 electrolyte LLE"
        evidence_tier: T1
        source: "data/reference/equilibrium_benchmarks/electrolyte_lle/water_ethanol_isobutanol_nacl"
        fixture_status: available
        acceptance_checks:
          - source_backed_data
          - charge_balance
          - electrochemical_potential_equality
          - shared_phase_equilibrium_certification
          - reduced_electroneutral_lift_back_lift
          - projected_mean_ionic_transfer_residual
          - born_ssm_ds_exact_hessian
