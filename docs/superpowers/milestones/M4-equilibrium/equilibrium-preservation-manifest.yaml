activation_authority: packages/epcsaft-equilibrium/src/epcsaft_equilibrium/native/equilibrium/core/activation_matrix.h
preservation_decisions:
  preserve_directly: Keep the current responsibility and owner through migration.
  preserve_concept_rewrite_owner: Keep the responsibility and proof, then move it to the stage-selected canonical owner.
  validation_only: Retain the evidence without treating its output as desired runtime parity.
  retire: Remove the named alias, branch, or binding after its callers move; retain any separately classified mathematics.
scientific_invariants:
  neutral_global_algorithm_identity: held_incomplete_component_work
  held_stage_iii_canonical_objective: direct_total_free_energy_minimization
  held_stage_iii_residual_solve_role: optional_correction_or_diagnostic
