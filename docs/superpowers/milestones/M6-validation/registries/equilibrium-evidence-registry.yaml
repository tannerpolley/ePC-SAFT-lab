schema_version: 1
registry_role: m6_equilibrium_evidence
milestone_owner: M6 - Validation
m4_algorithm_registry: docs/superpowers/milestones/M4-equilibrium/registries/equilibrium-algorithm-admission-registry.yaml
activation_authority: packages/epcsaft-equilibrium/src/epcsaft_equilibrium/native/equilibrium/core/activation_matrix.h
claim_boundary: Evidence maturity never declares runtime route exposure or completes M4 algorithm admission by implication.
evidence_status_vocabulary:
  available: A source-backed executable fixture or retained evidence record is locally available.
  source_data_needed: The named literature target is not an executable local fixture and receives no completion credit.
  component_evidence_only: The record proves only its named component or diagnostic scope.
evidence_tiers:
  T0:
    name: documented_design_or_inventory
    admission_authority: false
  T1:
    name: executable_package_fixture
    admission_authority: false
  T2:
    name: source_digitized_reference
    admission_authority: false
  T3:
    name: reproduced_literature_curve_or_table
    admission_authority: false
family_evidence:
- family_label: PE-Neutral TP Flash
  diagnostic_evidence:
  - evidence_label: Matsuda neutral LLE internal sampled-candidate diagnostic
    evidence_tier: T1
    command: uv run --no-sync python scripts/validation/check_neutral_lle_showcase.py --json --require-complete --require-fresh-native
    scope: Source-backed Matsuda/NIST neutral nonassociating LLE fixture with internal sampled-candidate and exact-derivative
      evidence.
    result_requirement: Source and tolerance margins pass, native identity is fresh, and the payload explicitly reports closed
      public admission and no global HELD proof.
  reference_cases:
  - case_label: Hydrocarbon workbook derived TP flash
    evidence_tier: T1
    source: data/reference/equilibrium_benchmarks/neutral_tp_flash/methane_ethane_propane
    source_model_family: PC-SAFT
    fixture_status: available
    acceptance_checks:
    - source_backed_parameters
    - material_balance
    - pressure_consistency
    - chemical_potential_equality
    - held_stage_certification
    - exact_hessian
  - case_label: Matsuda 2011 perfluorohexane + hexane neutral LLE
    evidence_tier: T1
    source: data/reference/equilibrium_benchmarks/neutral_lle/perfluorohexane_hexane
    retained_evidence: analyses/package_validation/neutral_nonassociating_lle_showcase
    source_model_family: PC-SAFT-compatible sPC-SAFT
    route: neutral_lle
    fixture_status: available
    scope: Source-backed neutral nonassociating binary LLE showcase with paired NIST binodal branch rows and source-fitted
      binary interaction.
    acceptance_checks:
    - source_backed_binodal_branch_rows
    - source_backed_pure_parameters
    - source_fitted_binary_interaction
    - internal_sampled_candidate_diagnostic
    - material_balance
    - pressure_consistency
    - chemical_potential_equality
    - sampled_candidate_stage_ii_not_global_held
    - internal_stage_iii_refinement_evidence
    - public_route_admission_closed
    - internal_phase_equilibrium_evidence
    - source_tolerance_margins
    - exact_hessian
  - case_label: Pereira 2012 System III
    evidence_tier: T0
    source: Pereira et al. 2012 neutral HELD benchmark
    source_model_family: SAFT-VR
    current_fixture_blocker: model_family_mismatch
    fixture_status: source_data_needed
    todo: Select a source-backed ePC-SAFT-compatible neutral TP flash fixture, or add SAFT-VR/model-parity support before
      using Pereira as validation input.
    acceptance_checks:
    - source_backed_parameters
    - material_balance
    - pressure_consistency
    - chemical_potential_equality
    - held_stage_certification
    - exact_hessian
- family_label: PE-Associating TP Flash
  diagnostic_evidence:
  - evidence_label: Gross/Sadowski 2002 methanol/cyclohexane internal exact-Hessian gate
    evidence_tier: T2
    command: uv run python scripts/validation/check_associating_lle_gross_2002.py --json --require-source-data --require-exact-association-hessian
      --require-route-closed --require-complete
    scope: 'Source-backed one-associating-component neutral LLE fixture for issue #145 using Gross/Sadowski 2002 Figure 8,
      Table 1, Table 2, retained parameters, exact association Hessian diagnostics, internal source-pair certification, and
      closed public associating route admission.'
    result_requirement: Figure 8 LLE rows retained; methanol 2B association and cyclohexane neutral parameters retained; k_ij
      = 0.051 retained; exact association site first/second sensitivities and objective/pressure/mass-action/Lagrangian Hessians
      verified; public LLE admission remains closed until a separate global HELD proof and re-admission change.
  - evidence_label: Gross association internal evidence gate
    evidence_tier: T2
    command: uv run --no-sync python scripts/validation/check_gross_2002_association_acceptance.py --json --require-complete
      --require-exact-association-hessian --require-fresh-native
    scope: Source-backed internal associating LLE component evidence for the retained methanol/cyclohexane Figure 8 fixture
      and Figure 10 cross-association stress case.
    result_requirement: Checker returns complete with no blockers; exact association Hessian and fresh-native identity evidence
      are retained; public `lle`, reactive, TP-flash, and generalized associating phase-set surfaces remain closed.
  reference_cases:
  - case_label: Gross/Sadowski 2002 methanol/cyclohexane
    evidence_tier: T2
    source: data/reference/equilibrium_benchmarks/associating_lle/methanol_cyclohexane
    source_model_family: PC-SAFT
    route: associating_lle_internal_proof
    fixture_status: available
    proof_status: internal_exact_hessian_source_pair_certified
    scope: Source-backed methanol/cyclohexane Figure 8 liquid-liquid branch fixture for one-associating-component internal
      validation.
    acceptance_checks:
    - source_digitized_figure_8_lle_rows
    - source_backed_parameters
    - source_backed_binary_interaction
    - public_route_admission_closed
    - sampled_candidate_stage_ii_not_global_held
    - association_mass_action
    - exact_hessian
    - internal_phase_equilibrium_evidence
    - source_tolerance_margins
  - case_label: Water/1-pentanol associating follow-on
    evidence_tier: T0
    source: source-backed associating follow-on target to be selected
    fixture_status: source_data_needed
    acceptance_checks:
    - two_associating_components
    - association_mass_action
    - exact_hessian
- family_label: PE-Electrolyte LLE/TP Flash
  algorithm_identity_boundary:
    perdomo_modified_mole_held2: No retained evidence row establishes the complete modified-mole controller or direct
      total-free-energy Stage III.
    ascani_counterion_pair: Counterion-pair and mean-ionic receipts are retained as component evidence for this separate
      algorithm family.
    ionic_certificate_policy: Each source case must name a formulation-specific modified-potential or mean-ionic condition;
      generic individual ionic chemical-potential equality is not accepted without an explicit Galvani convention.
  diagnostic_evidence:
  - evidence_label: Khudaida electrolyte GFPE closed-admission gate
    evidence_tier: T1
    command: uv run --no-sync python scripts/validation/check_electrolyte_gfpe_gate.py --json --require-source-data --require-parameter-bundle
      --require-native-diagnostics --require-complete
    scope: Pre-association electrolyte GFPE source-data, raw closure-drift accounting, normalized explicit-ion expansion,
      and native electrolyte/charge diagnostics for the Khudaida 2026 source fixture.
    result_requirement: Khudaida source fixture parsed; raw paper-row closure correction recorded; explicit-ion charge balance
      <= 1.0e-8; path-based `2026_Khudaida` parameter bundle constructs native mixture; native electrolyte contribution active;
      native phase-charge diagnostic residual <= 1.0e-8.
  - evidence_label: Electrolyte HELD2 readiness and Born SSM/DS exactness gate
    evidence_tier: T1
    command: uv run --no-sync python scripts/validation/check_electrolyte_held2_readiness.py --json --require-source-gate
      --require-reduced-basis --require-born-ssm-ds --require-complete
    scope: 'Prerequisite-only electrolyte HELD2 readiness evidence for the Khudaida 2026 source fixture: consumes the source
      gate, verifies the exact NaCl charge-neutral reduced amount lift, and records CppAD Born SSM/DS derivative receipts.'
    result_requirement: 'Khudaida source gate complete; reduced NaCl amount lift charge residual <= 1.0e-10; CppAD Born SSM/DS
      composition, ln-fugacity, activity-parameter, `d_born`, and `f_solv` derivative receipts finite; HELD2 status marked
      readiness-only. Electrolyte TPD screening is covered by the #302 evidence row.'
  - evidence_label: Charge-neutral electrolyte TPD screening gate
    evidence_tier: T1
    command: uv run --no-sync python scripts/validation/check_electrolyte_tpd_gate.py --json --require-source-gate --require-held2-readiness
      --require-native-tpd --require-complete
    scope: 'Prerequisite-only electrolyte TPD screening evidence for the Khudaida 2026 source fixture: consumes the source
      gate and readiness gate, and calls native `_native_electrolyte_tpd_phase_discovery`.'
    result_requirement: Three finite source-backed candidates; selected candidate count 2; minimum TPD -0.010922388988229025;
      maximum charge residual 0.0; HELD2 status marked readiness-only.
  - evidence_label: Electrolyte HELD2 counterion-pair phase-discovery gate
    historical_label: HELD2 counterion-pair phase-discovery
    algorithm_identity: ascani_counterion_pair_component
    evidence_tier: T1
    command: uv run --no-sync python scripts/validation/check_electrolyte_held2_phase_discovery.py --json --require-source-gate
      --require-readiness-gate --require-tpd-gate --require-native-held2-discovery --require-complete
    scope: 'Phase-discovery-only electrolyte HELD2 evidence: consumes #269/#300/#302 gates, calls native `_native_electrolyte_held2_phase_discovery`,
      reports independent counterion-pair matrix diagnostics, source-backed multi-ion preprocessor fixtures, charge-neutral
      lifted candidate rows, and pair-based mean-ionic bookkeeping.'
    result_requirement: Counterion-pair matrix rank equals N_ch - 1; Na+/Cl-, Na+/K+/Cl-, and K+/Cl-/Na+/SO4-- source/methodology
      cases are covered; selected candidate count is positive; minimum TPD and pair residual metrics are finite.
  - evidence_label: Electrolyte HELD2 Stage III reduced-variable refinement gate
    historical_label: HELD2 Stage III reduced-variable refinement
    algorithm_identity: ascani_family_local_residual_correction_not_perdomo_stage_iii
    evidence_tier: T1
    command: uv run --no-sync python scripts/validation/check_electrolyte_stage_iii_refinement.py --json --require-source-gate
      --require-readiness-gate --require-tpd-gate --require-held2-discovery --require-native-stage-iii --require-complete
    scope: 'Stage III electrolyte refinement evidence: consumes #269/#300/#302/#306, calls native `_native_electrolyte_stage_iii_refinement`,
      records the #306 candidate-set seed provenance, reduced counterion-pair residual variables/equations/scaling/bounds,
      exact reduced Jacobian/Hessian receipts, strict Ipopt solve diagnostics, and finite phase compositions.'
    result_requirement: Checker returns complete with no blockers; Ipopt status `Solve_Succeeded`; reduced residual infinity
      norm <= 1.0e-4; charge/material/pressure diagnostics finite; exact reduced residual Jacobian/Hessian receipts retained.
  - evidence_label: Electrolyte postsolve phase-set certification gate
    evidence_tier: T1
    command: uv run --no-sync python scripts/validation/check_electrolyte_postsolve_certification.py --json --require-stage-iii
      --require-postsolve-certification --require-complete
    scope: 'Postsolve electrolyte phase-set certification evidence: consumes #312, calls native `_native_electrolyte_postsolve_certification`,
      and retains explicit-ion reconstruction, per-phase and total charge residuals, neutral and mean-ionic transfer residuals,
      pressure consistency, phase amount, composition normalization, and domain-margin diagnostics.'
    result_requirement: Checker returns complete with no blockers; explicit-ion feed reconstruction <= 1.0e-4; phase and total
      charge residuals <= 1.0e-8; neutral and mean-ionic transfer residuals <= 1.0e-4; pressure consistency <= 1.0e-4; phase
      distance exceeds 1.0e-8.
  reference_cases:
  - case_label: Khudaida 2026 electrolyte LLE
    evidence_tier: T1
    source: data/reference/equilibrium_benchmarks/electrolyte_lle/water_ethanol_isobutanol_nacl
    fixture_status: available
    acceptance_checks:
    - source_backed_data
    - charge_balance
    - formulation_specific_independent_ionic_condition
    - shared_phase_equilibrium_certification
    - reduced_electroneutral_lift_back_lift
    - projected_mean_ionic_transfer_residual
    - born_ssm_ds_exact_hessian
    - electrolyte_tpd_or_held2_certification
    - electrolyte_postsolve_phase_set_certification
  - case_label: Held 2014 Figure 6
    evidence_tier: T0
    source: Held et al. 2014 ePC-SAFT benchmark
    fixture_status: source_data_needed
    acceptance_checks:
    - charge_balance
    - source_formulation_independent_ionic_condition_audit
  - case_label: Ascani/Sadowski/Held 2022 mixed-solvent LLE
    evidence_tier: T0
    source: Ascani, Sadowski, Held 2022 electrolyte LLE benchmark
    fixture_status: source_data_needed
    acceptance_checks:
    - mixed_solvent_electrolyte_lle
    - mean_ionic_potential_equality
- family_label: PE-Generalized Multiphase
  diagnostic_evidence:
  - evidence_label: Neutral generalized sampled-candidate audit
    evidence_tier: T1
    command: uv run --no-sync python scripts/validation/check_generalized_phase_set.py --json --require-complete
    scope: Neutral nonassociating finite sampled-candidate record contract retained as internal diagnostic evidence; it does
      not prove global phase-set completeness.
    result_requirement: Three selected records, at least one rejected record, mass-balance feasible, noncollapsed selected
      compositions, status sampled_candidate_audit_complete_global_completeness_unproven, global_phase_set_certified=false,
      and the public route remains closed.
  - evidence_label: Strict neutral multiphase fugacity-residual refinement
    evidence_tier: T1
    command: uv run --no-sync python scripts/validation/check_generalized_phase_set.py --json --phase-kinds liquid,liquid,liquid
      --run-route-refinement --require-route-refinement --require-complete
    scope: Neutral nonassociating finite sampled-candidate replay refined by the strict fugacity-residual route; local refinement
      does not prove global phase discovery.
    result_requirement: strict_multiphase_fugacity_residual_route, exact_reduced_fugacity_residual_derivatives, sampled_candidate_set_replay_consumed,
      accepted local postsolve, ln_fugacity_consistency_norm <= 1.0e-6, and global_phase_set_certified=false.
  reference_cases:
  - case_label: Representative neutral/associating/electrolyte replay
    evidence_tier: T0
    source: docs/superpowers/milestones/M4-equilibrium/generalized-fluid-phase-equilibrium.md
    fixture_status: source_data_needed
    acceptance_checks:
    - all_eligible_phases_considered
    - candidate_phase_set_complete
    - no_phase_count_assumption
- family_label: CE Standalone Reactive Speciation
  diagnostic_evidence:
  - evidence_label: Standalone CE validation ladder
    evidence_tier: T1
    command: uv run --no-sync python scripts/validation/check_standalone_ce_gate.py --json --require-single-nlp-path --require-oracles
      --require-complete
    scope: Internal CE-only homogeneous evidence using analytic ideal, charged conservation, Ascani 2023 constants, MEA true-species
      bookkeeping, and retained Cantera/Pope oracle fixtures.
    retained_evidence: analyses/package_validation/standalone_ce/shared/results/summary.json
    result_requirement: Re-admission requires checker status complete, balance_inf_norm <= 1.0e-8, and reaction_stationarity_inf_norm
      <= 1.0e-6; the current MEA proof fails at 2.5999999998789356 and 73.79118023038392, so reactive speciation and coupled
      reactive surfaces remain closed.
  reference_cases:
  - case_label: Standalone CE validation ladder
    evidence_tier: T1
    source: analyses/package_validation/standalone_ce/shared/results/summary.json
    fixture_status: available
    acceptance_checks:
    - homogeneous_single_phase_only
    - standard_state_convention
    - reaction_affinity
    - exact_chemical_potential_derivatives
    - ce_validation_ladder
    - reactive_speciation_and_coupled_surfaces_closed
- family_label: CPE Simultaneous Phase-Chemistry Contract
  diagnostic_evidence: []
  reference_cases:
  - case_label: Simultaneous phase-chemistry interface contract
    evidence_tier: T0
    source: docs/contracts/cpe-interface.md
    fixture_status: source_data_needed
    acceptance_checks:
    - phase_species_amounts
    - phase_volumes
    - reaction_variables
    - reaction_affinity
    - transferable_potential_equality
    - phase_charge_when_applicable
    - pe_and_ce_blockers
    - disallow_staged_speciation_flash
