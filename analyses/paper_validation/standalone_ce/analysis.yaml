id: standalone_ce_validation_ladder
title: Standalone homogeneous chemical equilibrium validation ladder
status: complete
summary: Retained CE-only validation ladder for analytic, charged, Ascani, unassisted MEA, Cantera, and Pope evidence families.
source_plan: docs/superpowers/plans/2026-06-29-m4-ce-generic-pope-homotopy-continuation-plan.md
issue: 329
scope:
  equilibrium: standalone_chemical_equilibrium
  phase_scope: homogeneous_single_phase
  public_routes:
    - reactive_speciation
  closed_surfaces:
    - reactive_lle
    - reactive_electrolyte_lle
    - cpe
commands:
  checker:
    - uv run --no-sync python scripts/validation/check_standalone_ce_gate.py --json --require-single-nlp-path --require-oracles --require-complete
  mea_ce_oracle_comparison:
    - uv run --no-sync python analyses/paper_validation/standalone_ce/figures/mea_reactive_speciation_oracle_comparison/scripts/generate_data.py
    - uv run --no-sync python analyses/paper_validation/standalone_ce/figures/mea_reactive_speciation_oracle_comparison/scripts/render_figure.py
validation_families:
  - analytic_ideal
  - charged_conservation
  - ascani_2023
  - mea_speciation
  - cantera_reference_oracle
  - pope_reference_oracle
outputs:
  - path: analyses/paper_validation/standalone_ce/shared/results/summary.json
    kind: retained_validation_ladder_summary
  - path: analyses/paper_validation/standalone_ce/figures/mea_reactive_speciation_oracle_comparison/results/mea_ce_oracle_speciation_20C.svg
    kind: retained_ce_oracle_comparison_figure
  - path: analyses/paper_validation/standalone_ce/figures/mea_reactive_speciation_oracle_comparison/results/mea_ce_oracle_speciation_40C.svg
    kind: retained_ce_oracle_comparison_figure
  - path: analyses/paper_validation/standalone_ce/figures/mea_reactive_speciation_oracle_comparison/results/mea_ce_oracle_speciation_error_summary.svg
    kind: retained_unassisted_ce_oracle_error_figure
  - path: analyses/paper_validation/standalone_ce/figures/mea_reactive_speciation_oracle_comparison/results/mea_ce_owned_continuation_speciation_20C.svg
    kind: retained_ce_owned_continuation_comparison_figure
  - path: analyses/paper_validation/standalone_ce/figures/mea_reactive_speciation_oracle_comparison/results/mea_ce_owned_continuation_speciation_40C.svg
    kind: retained_ce_owned_continuation_comparison_figure
  - path: analyses/paper_validation/standalone_ce/figures/mea_reactive_speciation_oracle_comparison/results/mea_ce_continuation_stage_diagnostics.svg
    kind: retained_ce_continuation_stage_diagnostics
  - path: analyses/paper_validation/standalone_ce/figures/mea_reactive_speciation_oracle_comparison/results/mea_ce_eos_x_gamma_speciation_concentrated_20C.svg
    kind: retained_ce_activity_speciation_figure
  - path: analyses/paper_validation/standalone_ce/figures/mea_reactive_speciation_oracle_comparison/results/mea_ce_eos_x_gamma_speciation_trace_20C.svg
    kind: retained_ce_activity_speciation_figure
  - path: analyses/paper_validation/standalone_ce/figures/mea_reactive_speciation_oracle_comparison/results/mea_ce_eos_x_gamma_speciation_concentrated_40C.svg
    kind: retained_ce_activity_speciation_figure
  - path: analyses/paper_validation/standalone_ce/figures/mea_reactive_speciation_oracle_comparison/results/mea_ce_eos_x_gamma_speciation_trace_40C.svg
    kind: retained_ce_activity_speciation_figure
  - path: analyses/paper_validation/standalone_ce/figures/mea_reactive_speciation_oracle_comparison/results/mea_ce_eos_x_gamma_speciation_concentrated_60C.svg
    kind: retained_ce_activity_speciation_figure
  - path: analyses/paper_validation/standalone_ce/figures/mea_reactive_speciation_oracle_comparison/results/mea_ce_eos_x_gamma_speciation_trace_60C.svg
    kind: retained_ce_activity_speciation_figure
  - path: analyses/paper_validation/standalone_ce/figures/mea_reactive_speciation_oracle_comparison/results/mea_ce_eos_x_gamma_speciation_concentrated_80C.svg
    kind: retained_ce_activity_speciation_figure
  - path: analyses/paper_validation/standalone_ce/figures/mea_reactive_speciation_oracle_comparison/results/mea_ce_eos_x_gamma_speciation_trace_80C.svg
    kind: retained_ce_activity_speciation_figure
  - path: analyses/paper_validation/standalone_ce/figures/mea_reactive_speciation_oracle_comparison/results/mea_ce_unassisted_seed_audit.csv
