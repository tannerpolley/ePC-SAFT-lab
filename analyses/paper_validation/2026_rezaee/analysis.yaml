id: rezaee_2025_2026_source_evidence
title: Rezaee 2025/2026 source evidence
status: internal_source_evidence_only
summary: Retains source-backed Rezaee rows and basis diagnostics without a current package-model claim.
owner: project
boundary:
  objective: Preserve and validate the machine-readable literature evidence needed for future model work.
  not_objectives:
    - Claim a public reactive-electrolyte equilibrium route.
    - Claim current package phase-model validation.
    - Generate surrogate, process-design, costing, or presentation outputs.
epcsaft_dependency:
  required: false
  notes:
    - The current package exposes no reactive-electrolyte equilibrium route.
    - Provider-era equilibrium and regression APIs are outside this lane.
inputs:
  - path: analyses/paper_validation/2026_rezaee/shared/source/rezaee_2025_extraction_equilibrium_mole_fractions.csv
    kind: source_transcription
  - path: analyses/paper_validation/2026_rezaee/shared/source/rezaee_2025_doe_extraction_responses.csv
    kind: source_transcription
  - path: analyses/paper_validation/2026_rezaee/shared/source/rezaee_2025_optimum_neighborhood.csv
    kind: source_transcription
  - path: analyses/paper_validation/2026_rezaee/shared/source/rezaee_2025_real_brine_extraction.csv
    kind: source_transcription
outputs:
  - path: analyses/paper_validation/2026_rezaee/shared/results/processed/rezaee_2025_extraction_target_summary.csv
    kind: generated_source_summary
  - path: analyses/paper_validation/2026_rezaee/shared/results/processed/rezaee_2025_extraction_equilibrium_summary.csv
    kind: generated_source_summary
  - path: analyses/paper_validation/2026_rezaee/shared/results/processed/rezaee_2026_section32_basis_inference_rows.csv
    kind: generated_basis_diagnostic
  - path: analyses/paper_validation/2026_rezaee/shared/results/reaction_equilibrium/rezaee_2026_section32_basis_inference_summary.json
    kind: generated_basis_diagnostic
  - path: analyses/paper_validation/2026_rezaee/shared/results/reaction_equilibrium/summary.json
    kind: generated_source_evidence_summary
commands:
  source_evidence:
    - uv run --no-sync python analyses/paper_validation/2026_rezaee/scripts/run_all.py
expected:
  row_count: 26
  source_evidence_complete: true
  model_validation_complete: false
  phase_models_supported: false
  public_route_admitted: false
completion_contract:
  - The command exits zero only when the 26-row source and basis contracts pass.
  - The lane must report model_validation_complete and public_route_admitted as false.
  - The 36-row text statement remains a documented source mismatch until a traceable table is supplied.
