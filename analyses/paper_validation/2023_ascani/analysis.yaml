id: ascani_2023_reactive_phase_equilibrium
title: Ascani 2023 chemical plus phase equilibrium
status: blocked_source_data
summary: Public native Ipopt reactive LLE route-gate lane for Ascani 2023, with paper-match validation blocked on machine-readable source targets.
source_assets:
  - path: docs/papers/md/Ascani - 2023 - Simultaneous Predictions of Chemical and Phase Equilibria in Systems with an Esterif.md
    kind: paper_markdown
commands:
  paper_validation:
    - uv run python analyses\paper_validation\2023_ascani\scripts\run_all.py
expected:
  systems:
    - acetic acid + 1-pentanol + pentyl acetate + water
    - acetic acid + 1-hexanol + hexyl acetate + water
  equilibrium_constants:
    system_1:
      temperature_K: 318.15
      pressure_bar: 1.0
      K_a: 43.99
    system_2:
      temperature_K: 353.6
      pressure_bar: 1.0
      K_a: 22.92
  route_gate_accepted: true
  paper_match_accepted: false
  solver_backend: ipopt
tolerances:
  material_balance_abs: 1.0e-8
  reaction_stationarity_abs: 1.0e-8
  phase_composition_abs: requires source target table or digitization uncertainty
outputs:
  - path: analyses/paper_validation/2023_ascani/shared/results/reactive_phase_equilibrium/summary.json
    kind: source_target_blocker_summary
blocker:
  kind: missing_source_target_rows
  note: Public route gates can run from source constants and retained standard-state conversions, but Figure 8/9 and reactive tie-line paper-match rows are not yet machine-readable in this repo.
