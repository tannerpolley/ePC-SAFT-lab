id: standalone_ce_validation_ladder
title: Standalone homogeneous chemical equilibrium validation ladder
status: active_validation
summary: Active CE-only repair validation with retained analytic, charged, Ascani, MEA, Cantera, and Pope evidence families.
source_plan: docs/superpowers/plans/2026-06-29-m4-ce-generic-pope-homotopy-continuation-plan.md
issue: 329
scope:
  equilibrium: standalone_chemical_equilibrium
  phase_scope: homogeneous_single_phase
  public_routes: []
  closed_surfaces:
    - reactive_speciation
    - reactive_lle
    - reactive_electrolyte_lle
    - cpe
commands:
  checker:
    - uv run --no-sync python scripts/validation/check_standalone_ce_gate.py --json --require-single-nlp-path --require-oracles --require-complete
  mea_ce_oracle_comparison:
    - uv run --no-sync python analyses/package_validation/standalone_ce/figures/mea_reactive_speciation_oracle_comparison/scripts/generate_data.py
    - uv run --no-sync python analyses/package_validation/standalone_ce/figures/mea_reactive_speciation_oracle_comparison/scripts/render_figure.py
validation_families:
  - analytic_ideal
  - charged_conservation
  - ascani_2023
  - mea_speciation
  - cantera_reference_oracle
  - pope_reference_oracle
outputs:
  figures: figures/<figure_id>/output
  runs: figures/<figure_id>/output/runs
retained_artifacts:
  - path: analyses/package_validation/standalone_ce/shared/results/summary.json
    kind: retained_validation_ladder_summary
  - path: analyses/package_validation/standalone_ce/figures/mea_reactive_speciation_oracle_comparison/output/mea_ce_oracle_speciation_20C.svg
    kind: retained_ce_oracle_comparison_figure
  - path: analyses/package_validation/standalone_ce/figures/mea_reactive_speciation_oracle_comparison/output/mea_ce_oracle_speciation_40C.svg
    kind: retained_ce_oracle_comparison_figure
  - path: analyses/package_validation/standalone_ce/figures/mea_reactive_speciation_oracle_comparison/output/mea_ce_oracle_speciation_error_summary.svg
    kind: retained_unassisted_ce_oracle_error_figure
  - path: analyses/package_validation/standalone_ce/figures/mea_reactive_speciation_oracle_comparison/output/mea_ce_owned_continuation_speciation_20C.svg
    kind: retained_ce_owned_continuation_comparison_figure
  - path: analyses/package_validation/standalone_ce/figures/mea_reactive_speciation_oracle_comparison/output/mea_ce_owned_continuation_speciation_40C.svg
    kind: retained_ce_owned_continuation_comparison_figure
  - path: analyses/package_validation/standalone_ce/figures/mea_reactive_speciation_oracle_comparison/output/mea_ce_continuation_stage_diagnostics.svg
    kind: retained_ce_continuation_stage_diagnostics
  - path: analyses/package_validation/standalone_ce/figures/mea_reactive_speciation_oracle_comparison/output/mea_ce_unassisted_seed_audit.csv
    kind: retained_ce_seed_policy_audit
  - path: analyses/package_validation/standalone_ce/figures/mea_reactive_speciation_oracle_comparison/output/mea_ce_continuation_trace_summary.csv
    kind: retained_ce_continuation_trace_summary
  - path: analyses/package_validation/standalone_ce/figures/mea_reactive_speciation_oracle_comparison/output/mea_ce_shuffled_subset_audit.csv
    kind: retained_ce_shuffled_no_oracle_audit
re_admission:
  required_status: complete
  limits:
    balance_inf_norm_max: 1.0e-8
    reaction_stationarity_inf_norm_max: 1.0e-6
current_evidence:
  status: failing
  temperature_C: 40.0
  loading_mol_co2_per_mol_mea: 0.4
  accepted: false
  failure_class: balance_failure
  balance_inf_norm: 2.5999999998789356
  reaction_stationarity_inf_norm: 73.79118023038392
  captured_by: uv run --no-sync python analyses/package_validation/standalone_ce/figures/mea_reactive_speciation_oracle_comparison/scripts/generate_data.py
claim_boundary: Standalone CE remains internal validation work; reactive speciation, reactive LLE, reactive electrolyte LLE, and CPE are closed.
