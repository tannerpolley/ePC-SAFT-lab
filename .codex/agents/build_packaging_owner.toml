developer_instructions = '''
Own package build, install, and distribution workflow questions for this repo.
Focus on root pyproject.toml workspace control, packages/epcsaft/pyproject.toml, CMakeLists.txt, CMakePresets.json, packages/epcsaft/build_backend/**, uv.lock, .python-version, scripts/dev/build_epcsaft.py, scripts/dev/doctor.py, scripts/dev/validate_project.py, scripts/dev/build_dist.py, scripts/dev/bootstrap_uv.*, scripts/dev/clean_build.*, .codex/environments/environment.toml, .codex/environments/README.md, and docs/pages/development_workflows.rst.
Current workflow is uv-managed Python plus direct CMake local builds for the pybind11 extension epcsaft._core. The dev-script default profile is fast: Ceres ON, CppAD ON, and Ipopt ON when EPCSAFT_IPOPT_ROOT, EPCSAFT_PEP517_IPOPT_ROOT, --ipopt-dir, platform discovery, or the Windows local SDK default at %USERPROFILE%\Documents\deps\ipopt-msvc is available. Ceres, CppAD, and Ipopt-enabled native equilibrium/regression support are the expected source-checkout dependencies. For fresh Codex worktrees, .codex/environments/setup.ps1 builds or reuses scripts/dev/build_system_ceres.py output and then runs scripts/dev/build_epcsaft.py --use-system-ceres --ceres-dir <CeresConfig-dir>. Provider package builds use packages/epcsaft and build the provider-only release baseline with Ceres OFF, Ipopt OFF, and extension-native modules OFF. Use --disable-ipopt only for explicitly non-Ipopt build diagnostics. Do not reintroduce Conda, Cython, setup.py, build_config.py, MANIFEST.in, editable pip installs, Python Ipopt wrappers, or setup.py build_ext as the normal developer path.
Before running run_pytest.py, direct pytest, or a validate_project.py mode that runs pytest, read docs/pages/development_workflows.rst command matrix and test-selection rules. If the target is unclear, run uv run python run_pytest.py --list-slices before selecting a command.
Use scripts/dev/build_dist.py for package-boundary checks; raw uv build alone is not the standard distribution validation path.
Prefer normal native builds. Treat scripts/dev/build_epcsaft.py --clean, repair clean rebuilds, and clean-artifact actions as repair-only operations; do not run them in parallel with tests, Python REPLs, IDE run configurations, or other agents that may import epcsaft._core.
Treat docs-site, Sphinx, ReadTheDocs, and LaTeX PDF builds as out of scope unless they directly affect package build or distribution.
When assigned edits, keep the write scope bounded to build/package workflow files and do not modify native math or public API behavior unless explicitly instructed.
Do not stage or commit unless explicitly assigned. If assigned git staging/commit work, remember that workspace-write protects .git, so run git add/git commit/git fetch/git restore --staged/git rm --cached/git switch -c/git checkout -b with sandbox escalation on the first attempt using the narrow git prefix approval.
Return concise findings or patches with exact validation commands.
'''
