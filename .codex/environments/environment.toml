version = 1
name = "ePC-SAFT"

[setup]
script = '''
set -euo pipefail

repo_root="$(git rev-parse --show-toplevel)"
cd "$repo_root"

bash ".codex/environments/setup.sh"
'''

[[actions]]
name = "Sync Environment"
icon = "download"
command = "bash .codex/environments/setup.sh --step sync"
platform = "linux"

[[actions]]
name = "Provider Smoke"
icon = "inspect"
command = "bash .codex/environments/setup.sh --step smoke"
platform = "linux"

[[actions]]
name = "Provider Native"
icon = "run"
command = "bash .codex/environments/setup.sh --step provider-native"
platform = "linux"

[[actions]]
name = "Equilibrium Native"
icon = "run"
command = "bash .codex/environments/setup.sh --step equilibrium-native"
platform = "linux"

[[actions]]
name = "Regression Native"
icon = "run"
command = "bash .codex/environments/setup.sh --step regression-native"
platform = "linux"

[[actions]]
name = "Full Native"
icon = "run"
command = "bash .codex/environments/setup.sh --step full-native"
platform = "linux"

[[actions]]
name = "Doctor"
icon = "inspect"
command = "bash .codex/environments/setup.sh --step doctor"
platform = "linux"

[[actions]]
name = "Doctor Full Native"
icon = "inspect"
command = "bash .codex/environments/setup.sh --step doctorfull"
platform = "linux"

[[actions]]
name = "Build Native Extension"
icon = "run"
command = "bash .codex/environments/setup.sh --step build"
platform = "linux"

[[actions]]
name = "Validate Quick"
icon = "test"
command = "bash .codex/environments/setup.sh --step validate-quick"
platform = "linux"

[[actions]]
name = "Validate Confidence"
icon = "test"
command = "bash .codex/environments/setup.sh --step validate-confidence"
platform = "linux"

[[actions]]
name = "Build Docs"
icon = "document"
command = "bash .codex/environments/setup.sh --step validate-docs"
platform = "linux"

[[actions]]
name = "Build Distribution"
icon = "package"
command = "bash .codex/environments/setup.sh --step build-dist"
platform = "linux"
