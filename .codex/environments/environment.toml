version = 1
name = "ePC-SAFT"

[setup]
script = '''
$ErrorActionPreference = "Stop"
Set-StrictMode -Version Latest

$repoRoot = (git rev-parse --show-toplevel).Trim()
Set-Location $repoRoot

pwsh.exe -NoProfile -ExecutionPolicy Bypass -File ".codex/environments/setup.ps1"
'''

[[actions]]
name = "Sync Environment"
icon = "download"
command = "pwsh.exe -NoProfile -ExecutionPolicy Bypass -File .codex/environments/setup.ps1 -Step Sync"
platform = "win32"

[[actions]]
name = "Provider Smoke"
icon = "inspect"
command = "pwsh.exe -NoProfile -ExecutionPolicy Bypass -File .codex/environments/setup.ps1 -Step Smoke"
platform = "win32"

