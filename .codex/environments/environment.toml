version = 1
name = "ePC-SAFT"

[setup]
script = '''
$ErrorActionPreference = "Stop"
Set-StrictMode -Version Latest

$repoRoot = (git rev-parse --show-toplevel).Trim()
Set-Location $repoRoot

pwsh.exe -NoProfile -ExecutionPolicy Bypass -File ".codex/environments/setup.ps1"
'''

[[actions]]
name = "Sync Environment"
icon = "download"
command = "uv sync --no-install-project"
platform = "win32"

[[actions]]
name = "Provider Smoke"
icon = "inspect"
command = "pwsh.exe -NoProfile -ExecutionPolicy Bypass -File .codex/environments/setup.ps1 -Step Smoke"
platform = "win32"

[[actions]]
name = "Provider Native"
icon = "run"
command = "pwsh.exe -NoProfile -ExecutionPolicy Bypass -File .codex/environments/setup.ps1 -Step ProviderNative"
platform = "win32"

[[actions]]
name = "Equilibrium Native"
icon = "run"
command = "pwsh.exe -NoProfile -ExecutionPolicy Bypass -File .codex/environments/setup.ps1 -Step EquilibriumNative"
platform = "win32"

[[actions]]
name = "Regression Native"
icon = "run"
command = "pwsh.exe -NoProfile -ExecutionPolicy Bypass -File .codex/environments/setup.ps1 -Step RegressionNative"
platform = "win32"

[[actions]]
name = "Full Native"
icon = "run"
command = "pwsh.exe -NoProfile -ExecutionPolicy Bypass -File .codex/environments/setup.ps1 -Step FullNative"
platform = "win32"

[[actions]]
name = "Doctor"
icon = "inspect"
command = "pwsh.exe -NoProfile -ExecutionPolicy Bypass -File .codex/environments/setup.ps1 -Step Doctor"
platform = "win32"

[[actions]]
name = "Doctor Full Native"
icon = "inspect"
command = "pwsh.exe -NoProfile -ExecutionPolicy Bypass -File .codex/environments/setup.ps1 -Step DoctorFull"
platform = "win32"

[[actions]]
name = "Build Native Extension"
icon = "run"
command = "pwsh.exe -NoProfile -ExecutionPolicy Bypass -File .codex/environments/setup.ps1 -Step Build"
platform = "win32"

[[actions]]
name = "Check IntelliJ Contract"
icon = "inspect"
command = "uv run python scripts/dev/configure_jetbrains_project.py --check"
platform = "win32"

[[actions]]
name = "Validate Quick"
icon = "test"
command = "uv run python scripts/dev/validate_project.py quick"
platform = "win32"

[[actions]]
name = "Validate Confidence"
icon = "test"
command = "uv run python scripts/dev/validate_project.py confidence"
platform = "win32"

[[actions]]
name = "Build Docs"
icon = "document"
command = "uv run python scripts/dev/validate_project.py docs"
platform = "win32"

[[actions]]
name = "Build Distribution"
icon = "package"
command = "uv run python scripts/dev/build_dist.py"
platform = "win32"
